<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Wormzilla iOS Wrapper</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* joystick */
#joystick {
  position: fixed;
  bottom: 80px;
  left: 30px;
  width: 120px;
  height: 120px;
  background: rgba(0,0,0,0.2);
  border-radius: 50%;
  touch-action: none;
}

#stick {
  position: absolute;
  width: 50px;
  height: 50px;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  top: 35px;
  left: 35px;
}

/* boost button */
#boost {
  position: fixed;
  bottom: 100px;
  right: 40px;
  width: 80px;
  height: 80px;
  background: rgba(255,0,0,0.6);
  border-radius: 50%;
  text-align: center;
  line-height: 80px;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<iframe src="http://wormzilla.io"></iframe>

<div id="joystick">
  <div id="stick"></div>
</div>

<div id="boost">BOOST</div>

<script>
const stick = document.getElementById("stick");
const joystick = document.getElementById("joystick");

let centerX, centerY;

joystick.addEventListener("touchstart", e => {
  const rect = joystick.getBoundingClientRect();
  centerX = rect.left + rect.width / 2;
  centerY = rect.top + rect.height / 2;
});

joystick.addEventListener("touchmove", e => {
  const touch = e.touches[0];
  let dx = touch.clientX - centerX;
  let dy = touch.clientY - centerY;

  const distance = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
  const angle = Math.atan2(dy, dx);

  const x = Math.cos(angle) * distance;
  const y = Math.sin(angle) * distance;

  stick.style.transform = `translate(${x}px, ${y}px)`;

  // giả lập chuột di chuyển (không chắc game nhận)
  window.dispatchEvent(new MouseEvent("mousemove", {
    clientX: touch.clientX,
    clientY: touch.clientY
  }));
});

joystick.addEventListener("touchend", () => {
  stick.style.transform = `translate(0px,0px)`;
});

// boost giả lập click
document.getElementById("boost").addEventListener("touchstart", () => {
  window.dispatchEvent(new MouseEvent("mousedown"));
});

document.getElementById("boost").addEventListener("touchend", () => {
  window.dispatchEvent(new MouseEvent("mouseup"));
});
</script>

</body>
</html>
