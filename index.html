<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpessaSynth MIDI Player</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .player-container {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
            max-width: 600px;
            width: 100%;
            color: white;
            transition: all 0.3s ease;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            text-align: center;
            opacity: 0.7;
            margin-bottom: 30px;
            font-size: 0.85rem;
        }
        .upload-area {
            background: rgba(255,255,255,0.1);
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 25px;
        }
        .upload-area:hover {
            background: rgba(255,255,255,0.2);
            border-color: #ffd89b;
        }
        .file-input {
            display: none;
        }
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        button {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
            font-weight: bold;
        }
        button:hover {
            background: #ffb347;
            color: #1e2a3a;
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            background: #00000066;
            border-radius: 20px;
            padding: 12px 18px;
            font-family: monospace;
            font-size: 0.85rem;
            margin: 15px 0;
            text-align: center;
            word-break: break-all;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffb347, #ffdd77);
            transition: width 0.1s linear;
        }
        .song-info {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 15px;
            font-weight: bold;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 25px;
            opacity: 0.5;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        .loading {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
<div class="player-container">
    <h1>🎹 SpessaSynth Player</h1>
    <div class="sub">MIDI · SF2 SoundFont · Trình duyệt</div>

    <div class="upload-area" id="uploadArea">
        📂 Nhấn hoặc kéo thả file MIDI vào đây
        <input type="file" id="midiFileInput" accept=".mid,.midi" class="file-input">
    </div>

    <div class="controls">
        <button id="playBtn" disabled>▶ Phát</button>
        <button id="pauseBtn" disabled>⏸ Tạm dừng</button>
        <button id="stopBtn" disabled>⏹ Dừng</button>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="status" id="statusMsg">
        ⚙️ Đang khởi tạo SpessaSynth...
    </div>
    <div class="song-info" id="songInfo"></div>
    <footer>
        Dùng thư viện SpessaSynth | SoundFont: FatBoy (8MB - tải nhanh)<br>
        Có thể thay bằng GeneralUser GS (30MB) bằng cách đổi URL SoundFont
    </footer>
</div>

<script type="importmap">
    {
        "imports": {
            "spessasynth_lib": "https://unpkg.com/spessasynth_lib@4.2.12/spessasynth_lib.js"
        }
    }
</script>

<script type="module">
    import { Synthesizer, Output, Player } from 'spessasynth_lib';

    // --- CẤU HÌNH SOUNDFONT ---
    // SoundFont nhẹ (FatBoy 8MB) - tải nhanh, đủ dùng thử
    // Bạn có thể thay link này bằng bất kỳ SoundFont .sf2 nào (kể cả GeneralUser GS)
    const SOUNDFONT_URL = 'https://cdn.jsdelivr.net/gh/sgossman/FatBoy@master/FatBoy.sf2';
    // Nếu muốn dùng GeneralUser GS (30MB) chính chủ từ trang SpessaSynth, bỏ comment dòng dưới:
    // const SOUNDFONT_URL = 'https://spessasus.github.io/SpessaSynth/soundfonts/GeneralUserGS_2_0_3.sf2';
    
    let synth = null;
    let output = null;
    let player = null;
    let isSoundFontLoaded = false;
    let currentMidiData = null;
    let currentFileName = "";
    
    const statusDiv = document.getElementById('statusMsg');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const progressFill = document.getElementById('progressFill');
    const songInfoDiv = document.getElementById('songInfo');
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('midiFileInput');
    
    function setStatus(text, isLoading = false) {
        statusDiv.innerHTML = text;
        if (isLoading) {
            statusDiv.classList.add('loading');
        } else {
            statusDiv.classList.remove('loading');
        }
    }
    
    function enableButtons(enable) {
        playBtn.disabled = !enable || !currentMidiData || !isSoundFontLoaded;
        pauseBtn.disabled = !enable || !player || !player.isPlaying;
        stopBtn.disabled = !enable || !player || !player.isPlaying;
    }
    
    // Khởi tạo Synthesizer + load SoundFont
    async function initSynth() {
        setStatus("🎧 Đang tải SoundFont (khoảng 8-30MB)...", true);
        try {
            // Tạo output (Web Audio)
            output = new Output();
            // Tạo synthesizer với sample rate mặc định (44100)
            synth = new Synthesizer(output.audioContext, {});
            
            // Load SoundFont từ URL
            await synth.loadSoundFont(SOUNDFONT_URL);
            isSoundFontLoaded = true;
            setStatus("✅ SoundFont đã sẵn sàng! Hãy tải file MIDI lên.");
            enableButtons(true);
        } catch (e) {
            console.error(e);
            setStatus("❌ Lỗi tải SoundFont: " + e.message + "<br>Kiểm tra kết nối hoặc thử SoundFont khác.");
        }
    }
    
    // Tạo Player từ dữ liệu MIDI
    function createPlayerFromMidi(midiBytes) {
        if (!synth || !isSoundFontLoaded) {
            setStatus("⚠️ SoundFont chưa sẵn sàng, thử lại sau.");
            return null;
        }
        try {
            // Dừng player cũ nếu có
            if (player) {
                player.stop();
                player = null;
            }
            // Tạo player mới
            player = new Player(synth, output);
            // Load MIDI file (dạng Uint8Array)
            player.loadMIDI(midiBytes);
            
            // Cập nhật thông tin bài hát (nếu có metadata)
            const duration = player.getDuration() || 0;
            const minutes = Math.floor(duration / 60);
            const seconds = Math.floor(duration % 60);
            songInfoDiv.innerHTML = `🎵 ${currentFileName}  |  ⏱ ${minutes}:${seconds.toString().padStart(2,'0')}`;
            
            // Thiết lập cập nhật thanh progress
            let interval = null;
            const updateProgress = () => {
                if (player && player.isPlaying) {
                    const current = player.getCurrentTime();
                    const total = player.getDuration();
                    if (total > 0) {
                        const percent = (current / total) * 100;
                        progressFill.style.width = percent + '%';
                    }
                    requestAnimationFrame(updateProgress);
                } else if (!player || !player.isPlaying) {
                    if (interval) cancelAnimationFrame(interval);
                }
            };
            // Hủy interval cũ rồi chạy mới
            if (window._progressInterval) cancelAnimationFrame(window._progressInterval);
            window._progressInterval = requestAnimationFrame(function loop() {
                if (player && player.isPlaying) {
                    const current = player.getCurrentTime();
                    const total = player.getDuration();
                    if (total > 0) progressFill.style.width = (current / total) * 100 + '%';
                    window._progressInterval = requestAnimationFrame(loop);
                } else {
                    if (!player || !player.isPlaying) {
                        // Nếu dừng hẳn mà chưa về 0 thì reset sau khi kết thúc bài
                        if (player && player.getCurrentTime() >= player.getDuration() - 0.05) {
                            progressFill.style.width = '0%';
                        }
                    }
                    window._progressInterval = null;
                }
            });
            
            setStatus(`🎶 Đã load: ${currentFileName} — Nhấn Play`);
            enableButtons(true);
            return player;
        } catch (err) {
            console.error(err);
            setStatus("❌ Lỗi đọc file MIDI: " + err.message);
            return null;
        }
    }
    
    // Xử lý file MIDI được chọn
    function handleMidiFile(file) {
        if (!file) return;
        if (!file.name.match(/\.(mid|midi)$/i)) {
            setStatus("❌ Vui lòng chọn file .mid hoặc .midi");
            return;
        }
        currentFileName = file.name;
        setStatus(`📀 Đang đọc ${file.name}...`, true);
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const arrayBuffer = e.target.result;
            currentMidiData = new Uint8Array(arrayBuffer);
            if (isSoundFontLoaded && synth) {
                createPlayerFromMidi(currentMidiData);
            } else {
                setStatus("⏳ SoundFont chưa xong, sẽ tự động tạo player sau khi load SF2...");
                // Chờ SoundFont load xong rồi mới tạo player
                const waitForSF = setInterval(() => {
                    if (isSoundFontLoaded && synth) {
                        clearInterval(waitForSF);
                        createPlayerFromMidi(currentMidiData);
                    }
                }, 200);
            }
        };
        reader.onerror = () => setStatus("❌ Không thể đọc file");
        reader.readAsArrayBuffer(file);
    }
    
    // --- SỰ KIỆN ĐIỀU KHIỂN ---
    playBtn.onclick = () => {
        if (player && currentMidiData && !player.isPlaying) {
            player.play();
            setStatus(`🎵 Đang phát: ${currentFileName}`);
            enableButtons(true);
        } else if (!player && currentMidiData && isSoundFontLoaded) {
            createPlayerFromMidi(currentMidiData)?.play();
        } else {
            setStatus("⚠️ Chưa có MIDI hoặc SoundFont chưa sẵn sàng.");
        }
    };
    
    pauseBtn.onclick = () => {
        if (player && player.isPlaying) {
            player.pause();
            setStatus(`⏸ Đã tạm dừng: ${currentFileName}`);
            enableButtons(true);
        }
    };
    
    stopBtn.onclick = () => {
        if (player) {
            player.stop();
            progressFill.style.width = '0%';
            setStatus(`⏹ Đã dừng: ${currentFileName}`);
            enableButtons(true);
            if (window._progressInterval) {
                cancelAnimationFrame(window._progressInterval);
                window._progressInterval = null;
            }
        }
    };
    
    // Kéo thả file
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.style.background = 'rgba(255,255,255,0.25)';
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.style.background = 'rgba(255,255,255,0.1)';
    });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.style.background = 'rgba(255,255,255,0.1)';
        const files = e.dataTransfer.files;
        if (files.length > 0) handleMidiFile(files[0]);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleMidiFile(e.target.files[0]);
    });
    
    // Bắt đầu khởi tạo
    initSynth().catch(console.error);
    
    // Hướng dẫn thay SoundFont: chỉ cần sửa biến SOUNDFONT_URL ở đầu script.
    // Ví dụ dùng GeneralUser GS (30MB) chính chủ của SpessaSynth:
    // SOUNDFONT_URL = 'https://spessasus.github.io/SpessaSynth/soundfonts/GeneralUserGS_2_0_3.sf2'
</script>
</body>
</html>
