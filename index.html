<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhựt Love Vân 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a0033 0%, #2d0052 50%, #3d1a5c 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text-3d {
            font-size: 120px;
            font-weight: bold;
            color: #fff;
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(240, 147, 251, 0.6),
                0 0 60px rgba(102, 126, 234, 0.4),
                0 10px 30px rgba(0, 0, 0, 0.3);
            letter-spacing: 8px;
            animation: rotate3d 6s infinite linear;
            transform-style: preserve-3d;
            text-align: center;
        }

        @keyframes rotate3d {
            0% {
                transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            }
            25% {
                transform: rotateX(10deg) rotateY(90deg) rotateZ(5deg);
            }
            50% {
                transform: rotateX(0deg) rotateY(180deg) rotateZ(0deg);
            }
            75% {
                transform: rotateX(-10deg) rotateY(270deg) rotateZ(-5deg);
            }
            100% {
                transform: rotateX(0deg) rotateY(360deg) rotateZ(0deg);
            }
        }

        .fullscreen-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 12px 12px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 100;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            animation: float-up 3s infinite ease-in;
        }

        @keyframes float-up {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(50px);
            }
        }

        .heart {
            position: absolute;
            font-size: 24px;
            animation: float-heart 4s infinite;
            pointer-events: none;
        }

        @keyframes float-heart {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(100px) scale(1);
            }
        }

        .info {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="particles" id="particles"></div>
        
        <div class="text-3d">
            Nhựt ❤️ Vân
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">
            ⛶
        </button>

        <div class="info">
            💫 Chạy xoay vòng 3D tuyệt đẹp 💫
        </div>
    </div>

    <script>
        // Tạo các hạt nổi lên
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = '100vh';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationDuration = (3 + Math.random() * 2) + 's';
                particlesContainer.appendChild(particle);
            }

            // Tạo lại các hạt sau khi animation kết thúc
            setInterval(() => {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = '100vh';
                particle.style.animationDuration = (3 + Math.random() * 2) + 's';
                particlesContainer.appendChild(particle);
                
                setTimeout(() => particle.remove(), 5000);
            }, 500);
        }

        // Tạo các trái tim bay lên
        function createHearts() {
            const container = document.querySelector('.container');
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = '❤️';
                heart.style.left = Math.random() * 80 + 10 + '%';
                heart.style.bottom = '-50px';
                heart.style.animationDuration = (3 + Math.random() * 2) + 's';
                container.appendChild(heart);
                
                setTimeout(() => heart.remove(), 5000);
            }, 800);
        }

        // Hàm bật/tắt toàn màn hình
        function toggleFullscreen() {
            const elem = document.documentElement;
            const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;

            if (!isFullscreen) {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.mozRequestFullScreen) {
                    elem.mozRequestFullScreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        // Khởi tạo
        createParticles();
        createHearts();
    </script>
</body>
</html>
