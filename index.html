<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Máy tính · hiển thị phép tính đang nhập</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #1e2128;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', -apple-system, sans-serif;
            padding: 8px;
            touch-action: manipulation;
        }

        .calculator {
            width: 100%;
            max-width: 380px;
            background: #1a1d24;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 2px 0 2px #2f3540 inset;
            padding: 20px 18px 26px 18px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 4px;
        }
        .history-header span {
            color: #9aaac7;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .delete-all-btn {
            background: #2d3442;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #e2b6b6;
            box-shadow: 0 4px 0 #181d26;
            border: 1px solid #4d5a6e;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
        }
        .delete-all-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a1e28;
        }

        .history-panel {
            background: #131722;
            border-radius: 22px;
            padding: 14px 14px 10px 14px;
            margin-bottom: 16px;
            border: 1px solid #2f3747;
            box-shadow: inset 0 4px 6px #0b0e14;
            max-height: 150px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #3f5068 #1b212c;
        }
        .history-panel::-webkit-scrollbar {
            width: 5px;
        }
        .history-panel::-webkit-scrollbar-track {
            background: #1b212c;
        }
        .history-panel::-webkit-scrollbar-thumb {
            background: #3f5068;
            border-radius: 10px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #b9c7e6;
            font-size: 20px;
            font-weight: 400;
            background: #1c222f;
            padding: 6px 16px 6px 16px;
            border-radius: 40px;
            border: 1px solid #354052;
            box-shadow: 0 2px 0 #0e121b;
        }
        .history-op {
            font-weight: 300;
            color: #cbd5f0;
        }
        .history-eq {
            color: #7c8bb0;
            margin: 0 8px;
        }
        .history-result {
            font-weight: 600;
            color: #ffffff;
            background: #2a3347;
            padding: 3px 18px;
            border-radius: 30px;
            font-size: 20px;
            box-shadow: inset 0 1px 3px black;
        }

        .empty-history-msg {
            color: #4e5b72;
            text-align: center;
            padding: 14px 0;
            font-size: 17px;
        }

        /* KHU VỰC MÀN HÌNH: GỒM 2 DÒNG (biểu thức trên, kết quả dưới) */
        .display-area {
            background: #0f1219;
            border-radius: 28px;
            padding: 12px 20px 8px 20px;
            margin-bottom: 18px;
            border: 2px solid #354153;
            box-shadow: 0 6px 0 #080b10;
        }

        #expression-display {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #9dafd1;
            font-size: 20px;
            font-weight: 300;
            text-align: right;
            white-space: nowrap;
            overflow-x: auto;
            padding-bottom: 4px;
            border-bottom: 1px dashed #33405a;
        }

        #calc-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4ff;
            font-size: 46px;
            font-weight: 500;
            text-align: right;
            line-height: 1.2;
            margin-top: 2px;
        }
        #calc-input::placeholder {
            color: #374153;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            background: #272e3b;
            border: none;
            border-radius: 30px;
            padding: 18px 0;
            font-size: 28px;
            font-weight: 500;
            color: #f0f4fd;
            box-shadow: 0 6px 0 #131722, 0 5px 12px black;
            transition: 0.05s linear;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #48546b;
            border-bottom-width: 2px;
            touch-action: manipulation;
            user-select: none;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #131722;
            background: #4e5f7a !important;
            color: white;
            border-color: #7c90b0;
        }

        .btn.top-action {
            background: #364153;
            border-color: #57677f;
        }

        .btn.operator {
            background: #314763;
            color: #ffda9e;
            border-color: #5f779b;
            font-size: 34px;
            font-weight: 600;
        }

        .btn.equals {
            background: #3f62a0;
            border-color: #6e96d4;
            color: white;
            font-size: 34px;
            box-shadow: 0 6px 0 #25395b;
        }

        .btn.dot {
            font-size: 38px;
            padding-bottom: 22px;
        }

        @media (max-width: 360px) {
            .btn { font-size: 24px; padding: 14px 0; }
            #calc-input { font-size: 40px; }
            #expression-display { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- Header LỊCH SỬ + thùng rác -->
        <div class="history-header">
            <span>LỊCH SỬ</span>
            <button class="delete-all-btn" id="deleteAllHistoryBtn" title="Xoá tất cả">🗑️</button>
        </div>

        <!-- Khung hiển thị lịch sử (ban đầu trống) -->
        <div class="history-panel">
            <div class="history-list" id="historyContainer">
                <!-- Sẽ render bằng js, ban đầu trống hoàn toàn -->
            </div>
        </div>

        <!-- MÀN HÌNH CHÍNH: 2 dòng - biểu thức trên, kết quả dưới -->
        <div class="display-area">
            <input type="text" id="expression-display" readonly placeholder=" " value=" ">
            <input type="text" id="calc-input" readonly placeholder="0" value="0">
        </div>

        <!-- Grid nút bấm -->
        <div class="button-grid">
            <!-- hàng 1 -->
            <button class="btn top-action" id="clearBtn">C</button>
            <button class="btn top-action" id="plusMinusBtn">±</button>
            <button class="btn top-action" id="percentBtn">%</button>
            <button class="btn operator" id="divideBtn">÷</button>

            <!-- hàng 2 -->
            <button class="btn" id="num7">7</button>
            <button class="btn" id="num8">8</button>
            <button class="btn" id="num9">9</button>
            <button class="btn operator" id="multiplyBtn">×</button>

            <!-- hàng 3 -->
            <button class="btn" id="num4">4</button>
            <button class="btn" id="num5">5</button>
            <button class="btn" id="num6">6</button>
            <button class="btn operator" id="minusBtn">−</button>

            <!-- hàng 4 -->
            <button class="btn" id="num1">1</button>
            <button class="btn" id="num2">2</button>
            <button class="btn" id="num3">3</button>
            <button class="btn operator" id="plusBtn">+</button>

            <!-- hàng 5 -->
            <button class="btn" id="num0">0</button>
            <button class="btn dot" id="dotBtn">.</button>
            <button class="btn equals" id="equalsBtn">=</button>
        </div>
    </div>

    <script>
        (function() {
            // State
            let currentInput = '0';               // số hiện tại (màn hình dưới)
            let expressionStr = '';                // biểu thức đang xây dựng (màn hình trên)
            let previousOperand = null;
            let pendingOperator = null;
            let shouldResetInput = false;

            let historyItems = [];                  // lịch sử, ban đầu trống

            const inputField = document.getElementById('calc-input');
            const exprField = document.getElementById('expression-display');
            const historyContainer = document.getElementById('historyContainer');
            const deleteAllBtn = document.getElementById('deleteAllHistoryBtn');

            // Cập nhật cả 2 màn hình
            function updateDisplays() {
                inputField.value = currentInput;
                exprField.value = expressionStr || ' '; // nếu rỗng thì hiện khoảng trống
            }

            // Render lịch sử
            function renderHistory() {
                if (historyItems.length === 0) {
                    historyContainer.innerHTML = `<div class="empty-history-msg">⋯ chưa có phép tính</div>`;
                    return;
                }
                let html = '';
                for (let item of historyItems) {
                    html += `<div class="history-item">
                        <span class="history-op">${item.operation}</span>
                        <span class="history-eq">=</span>
                        <span class="history-result">${item.result}</span>
                    </div>`;
                }
                historyContainer.innerHTML = html;
            }

            // Thêm vào lịch sử
            function addHistory(operation, result) {
                historyItems.unshift({ operation, result });
                if (historyItems.length > 50) historyItems.pop();
                renderHistory();
            }

            // Xoá toàn bộ lịch sử
            function deleteAllHistory() {
                historyItems = [];
                renderHistory();
            }

            // Reset máy tính (C)
            function clearAll() {
                currentInput = '0';
                expressionStr = '';
                previousOperand = null;
                pendingOperator = null;
                shouldResetInput = false;
                updateDisplays();
            }

            // Nhập số
            function inputNumber(num) {
                if (shouldResetInput) {
                    currentInput = '';
                    shouldResetInput = false;
                }
                if (currentInput === '0' && num === '0') return;
                if (currentInput === '0' && num !== '.') {
                    currentInput = num;
                } else {
                    if (currentInput.replace('-','').replace('.','').length < 14) {
                        currentInput += num;
                    }
                }

                // Cập nhật biểu thức hiển thị khi đang nhập số
                if (pendingOperator && previousOperand !== null) {
                    // Trường hợp đã có toán tử và số hạng trước, hiển thị: previousOperand + operator + số đang nhập
                    expressionStr = `${previousOperand} ${pendingOperator} ${currentInput}`;
                } else if (previousOperand !== null && pendingOperator === null) {
                    // Sau khi nhấn =, previousOperand được clear, nên không vào đây
                    expressionStr = `${previousOperand}`;
                } else {
                    // Chưa có toán tử, chỉ hiển thị số hiện tại (hoặc có thể để trống? nhưng để số hiện tại cho dễ)
                    expressionStr = currentInput;
                }
                updateDisplays();
            }

            // Dấu chấm
            function inputDot() {
                if (shouldResetInput) {
                    currentInput = '0';
                    shouldResetInput = false;
                }
                if (!currentInput.includes('.')) {
                    currentInput += '.';
                }
                // cập nhật biểu thức giống inputNumber
                if (pendingOperator && previousOperand !== null) {
                    expressionStr = `${previousOperand} ${pendingOperator} ${currentInput}`;
                } else {
                    expressionStr = currentInput;
                }
                updateDisplays();
            }

            // Đổi dấu
            function toggleSign() {
                if (currentInput !== '0' && currentInput !== '') {
                    if (currentInput.startsWith('-')) {
                        currentInput = currentInput.substring(1);
                    } else {
                        currentInput = '-' + currentInput;
                    }
                }
                // cập nhật biểu thức
                if (pendingOperator && previousOperand !== null) {
                    expressionStr = `${previousOperand} ${pendingOperator} ${currentInput}`;
                } else {
                    expressionStr = currentInput;
                }
                updateDisplays();
            }

            // Phần trăm
            function percent() {
                if (currentInput) {
                    let val = parseFloat(currentInput) / 100;
                    currentInput = String(val);
                    if (pendingOperator && previousOperand !== null) {
                        expressionStr = `${previousOperand} ${pendingOperator} ${currentInput}`;
                    } else {
                        expressionStr = currentInput;
                    }
                    updateDisplays();
                }
            }

            // Tính toán
            function compute(op, left, right) {
                const a = parseFloat(left);
                const b = parseFloat(right);
                if (isNaN(a) || isNaN(b)) return NaN;
                switch (op) {
                    case '+': return a + b;
                    case '−': return a - b;
                    case '×': return a * b;
                    case '÷': return a / b;
                    default: return b;
                }
            }

            // Xử lý phép toán
            function handleOperator(opSymbol) {
                // Nếu đang có phép toán chờ, thực hiện phép tính trước
                if (pendingOperator !== null && previousOperand !== null && !shouldResetInput) {
                    let result = compute(pendingOperator, previousOperand, currentInput);
                    if (!isNaN(result) && isFinite(result)) {
                        let operationStr = `${previousOperand} ${pendingOperator} ${currentInput}`;
                        result = Math.round((result + Number.EPSILON) * 1e12) / 1e12;
                        let resultStr = String(result);
                        // Lưu lịch sử
                        addHistory(operationStr, resultStr);
                        previousOperand = result;
                        currentInput = resultStr;
                    } else {
                        currentInput = 'Error';
                        previousOperand = null;
                        pendingOperator = null;
                        expressionStr = '';
                        updateDisplays();
                        return;
                    }
                } else {
                    // Trường hợp đầu tiên hoặc đã qua bằng
                    if (previousOperand === null || shouldResetInput) {
                        previousOperand = currentInput;
                    }
                }
                pendingOperator = opSymbol;
                shouldResetInput = true;

                // Cập nhật biểu thức hiển thị: vd "88 × "
                expressionStr = `${previousOperand} ${pendingOperator}`;
                updateDisplays();
            }

            // Xử lý dấu bằng
            function handleEquals() {
                if (pendingOperator !== null && previousOperand !== null && !shouldResetInput) {
                    let result = compute(pendingOperator, previousOperand, currentInput);
                    if (!isNaN(result) && isFinite(result)) {
                        let operationStr = `${previousOperand} ${pendingOperator} ${currentInput}`;
                        result = Math.round((result + Number.EPSILON) * 1e12) / 1e12;
                        let resultStr = String(result);
                        addHistory(operationStr, resultStr);
                        // Cập nhật màn hình dưới là kết quả, màn hình trên hiển thị phép tính đã hoàn thành
                        currentInput = resultStr;
                        expressionStr = operationStr + ' =';
                        previousOperand = null;
                        pendingOperator = null;
                        shouldResetInput = true;
                    } else {
                        currentInput = 'Error';
                        previousOperand = null;
                        pendingOperator = null;
                        expressionStr = '';
                        shouldResetInput = true;
                    }
                } else {
                    // Nếu không có phép toán, chỉ reset
                    shouldResetInput = true;
                    expressionStr = '';
                }
                updateDisplays();
            }

            // Gán sự kiện
            document.getElementById('clearBtn').addEventListener('click', clearAll);
            document.getElementById('plusMinusBtn').addEventListener('click', toggleSign);
            document.getElementById('percentBtn').addEventListener('click', percent);
            document.getElementById('divideBtn').addEventListener('click', () => handleOperator('÷'));
            document.getElementById('multiplyBtn').addEventListener('click', () => handleOperator('×'));
            document.getElementById('minusBtn').addEventListener('click', () => handleOperator('−'));
            document.getElementById('plusBtn').addEventListener('click', () => handleOperator('+'));
            document.getElementById('equalsBtn').addEventListener('click', handleEquals);
            document.getElementById('dotBtn').addEventListener('click', inputDot);
            document.getElementById('num0').addEventListener('click', () => inputNumber('0'));
            document.getElementById('num1').addEventListener('click', () => inputNumber('1'));
            document.getElementById('num2').addEventListener('click', () => inputNumber('2'));
            document.getElementById('num3').addEventListener('click', () => inputNumber('3'));
            document.getElementById('num4').addEventListener('click', () => inputNumber('4'));
            document.getElementById('num5').addEventListener('click', () => inputNumber('5'));
            document.getElementById('num6').addEventListener('click', () => inputNumber('6'));
            document.getElementById('num7').addEventListener('click', () => inputNumber('7'));
            document.getElementById('num8').addEventListener('click', () => inputNumber('8'));
            document.getElementById('num9').addEventListener('click', () => inputNumber('9'));

            deleteAllBtn.addEventListener('click', deleteAllHistory);

            // Khởi tạo: lịch sử trống, màn hình 0
            clearAll();
            renderHistory(); // hiển thị "⋯ chưa có phép tính"

            // KHÔNG thêm dòng mẫu nào
        })();
    </script>
</body>
</html>
