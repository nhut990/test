<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NES Emulator - Chơi Game Nintendo</title>
    
    <!-- Import EmulatorJS -->
    <script src="https://cdn.emulatorjs.org/stable/data/emulator.js"></script>
    <link rel="stylesheet" href="https://cdn.emulatorjs.org/stable/data/emulator.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            touch-action: manipulation;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: #16213e;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #e94560;
            text-align: center;
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #emulator {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .file-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .file-input-group button {
            flex: 1;
            padding: 12px 15px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 80px;
        }
        
        .btn-load {
            background: #e94560;
            color: white;
        }
        
        .btn-load:hover {
            background: #c23152;
        }
        
        .btn-save {
            background: #0f3460;
            color: white;
        }
        
        .btn-save:hover {
            background: #1a4d8e;
        }
        
        .btn-reset {
            background: #533483;
            color: white;
        }
        
        .btn-reset:hover {
            background: #6a44a8;
        }
        
        .info {
            color: #a8a8b3;
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        
        .info a {
            color: #e94560;
            text-decoration: none;
        }
        
        /* Touch controls styling */
        .emulator-controls {
            --control-size: 50px !important;
        }
        
        @media (max-width: 400px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .file-input-group button {
                padding: 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 NES Emulator</h1>
        
        <!-- Emulator sẽ được render ở đây -->
        <div id="emulator"></div>
        
        <div class="controls">
            <div class="file-input-group">
                <input type="file" id="rom-input" accept=".nes" style="display:none">
                <button class="btn-load" onclick="document.getElementById('rom-input').click()">
                    📂 Chọn ROM .nes
                </button>
                <button class="btn-save" onclick="saveState()">
                    💾 Lưu Game
                </button>
                <button class="btn-reset" onclick="resetGame()">
                    🔄 Reset
                </button>
            </div>
            
            <!-- Hướng dẫn tải ROM mẫu -->
            <div class="info">
                <strong>Hướng dẫn:</strong><br>
                1. Click "Chọn ROM .nes" và chọn file game của bạn<br>
                2. Sử dụng nút ảo trên màn hình để chơi<br>
                3. Có thể load ROM từ URL: 
                <a href="#" onclick="loadSampleROM()">Tải ROM mẫu</a>
            </div>
        </div>
    </div>

    <script>
        let currentEmulator = null;
        let currentRom = null;
        
        // Khởi tạo emulator
        function initEmulator(romData) {
            const emulatorElement = document.getElementById('emulator');
            emulatorElement.innerHTML = '';
            
            currentEmulator = new Emulator(emulatorElement, {
                system: 'nes',
                rom: romData,
                controls: {
                    // Tự động bật touch controls cho mobile
                    touch: true,
                    // Tùy chỉnh layout nút
                    layout: {
                        up: { x: 0, y: 0 },
                        down: { x: 0, y: 2 },
                        left: { x: -1, y: 1 },
                        right: { x: 1, y: 1 },
                        a: { x: 1, y: 0 },
                        b: { x: 0, y: 0 },
                        start: { x: -2, y: 2 },
                        select: { x: -1, y: 2 }
                    }
                },
                // Tự động scale để vừa màn hình
                autoScale: true,
                // Cho phép save state
                enableSaveStates: true
            });
            
            // Bắt sự kiện khi emulator sẵn sàng
            currentEmulator.on('ready', () => {
                console.log('Emulator đã sẵn sàng!');
            });
        }
        
        // Xử lý khi chọn file ROM
        document.getElementById('rom-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                currentRom = e.target.result;
                initEmulator(currentRom);
            };
            reader.readAsDataURL(file);
            
            // Reset input để có thể chọn lại file cùng tên
            this.value = '';
        });
        
        // Lưu state game
        function saveState() {
            if (currentEmulator) {
                currentEmulator.saveState('slot1');
                alert('✅ Đã lưu game thành công!');
            } else {
                alert('⚠️ Chưa có game nào được load!');
            }
        }
        
        // Reset game
        function resetGame() {
            if (currentEmulator) {
                currentEmulator.reset();
            } else {
                alert('⚠️ Chưa có game nào được load!');
            }
        }
        
        // Load ROM mẫu (sẽ redirect đến trang có ROM hợp pháp)
        function loadSampleROM() {
            // Đây là ROM mẫu hợp pháp (public domain)
            const sampleRomUrl = 'https://emulatorjs.org/demo/nes/smb.nes';
            
            fetch(sampleRomUrl)
                .then(response => response.arrayBuffer())
                .then(data => {
                    const base64 = btoa(
                        new Uint8Array(data).reduce((data, byte) => data + String.fromCharCode(byte), '')
                    );
                    const romData = 'data:application/octet-stream;base64,' + base64;
                    initEmulator(romData);
                })
                .catch(error => {
                    alert('Không thể tải ROM mẫu. Vui lòng chọn ROM từ máy của bạn.');
                });
        }
        
        // Hiển thị thông báo nếu chưa load ROM
        window.onload = function() {
            const emulatorElement = document.getElementById('emulator');
            emulatorElement.style.display = 'flex';
            emulatorElement.style.alignItems = 'center';
            emulatorElement.style.justifyContent = 'center';
            emulatorElement.style.color = '#fff';
            emulatorElement.style.fontSize = '18px';
            emulatorElement.innerHTML = '<p>📁 Chọn ROM .nes để bắt đầu chơi</p>';
        };
    </script>
</body>
</html>
