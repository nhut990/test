<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>NES // Cartridge Player - OPTIMIZED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #100e14;
    --bg-grain: #17141b;
    --shell: #cfc9ba;
    --shell-dark: #a8a196;
    --shell-shadow: #6d685f;
    --screen-bezel: #232025;
    --accent-red: #c8433a;
    --accent-red-dark: #922e28;
    --ink: #201d22;
    --paper: #ece6d6;
    --ok: #6f9e6a;
    --font-pixel: 'Press Start 2P', monospace;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin:0; padding:0; height:100%; overscroll-behavior:none;
    background:
      radial-gradient(circle at 20% 10%, #1b1720 0%, var(--bg) 55%) fixed;
    color: var(--paper);
    font-family: var(--font-mono);
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #app{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:stretch;
  }

  /* ---------- Header ---------- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 14px;
    flex: 0 0 auto;
    gap:8px;
  }
  .logo{
    font-family: var(--font-pixel);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--paper);
    display:flex; align-items:center; gap:8px;
  }
  .logo .dot{ width:8px; height:8px; background:var(--accent-red); display:inline-block; box-shadow:0 0 6px var(--accent-red); }
  .hdr-btns{ display:flex; gap:6px; }
  .icon-btn{
    background: var(--ink);
    border: 1px solid #3a3540;
    color: var(--paper);
    width:34px; height:34px;
    border-radius:6px;
    font-size:15px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .icon-btn:active{ transform: translateY(1px); background:#2a2630; }
  .icon-btn.on{ border-color: var(--accent-red); color: var(--accent-red); }
  
  .info-text{
    font-size: 10px;
    color: #8a8492;
    min-width: 150px;
    text-align: right;
  }

  /* ---------- Loader ---------- */
  #loader{
    flex: 0 0 auto;
    margin: 0 14px 10px;
    border: 2px dashed #47414d;
    border-radius: 10px;
    padding: 16px;
    text-align:center;
    cursor:pointer;
    transition: border-color .15s, background .15s;
  }
  #loader.drag{ border-color: var(--accent-red); background: rgba(200,67,58,0.08); }
  #loader .slot-title{ font-family: var(--font-pixel); font-size: 10px; color:var(--paper); margin-bottom:6px; }
  #loader .slot-sub{ font-size:11px; color:#8a8492; }
  #loader input[type=file]{ display:none; }

  /* ---------- Stage ---------- */
  #stage{
    flex: 1 1 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: 0;
    padding: 4px 10px;
    position:relative;
  }
  #shell{
    background: linear-gradient(180deg, var(--shell), var(--shell-dark));
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 10px 24px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.4);
    max-width: 100%;
    max-height: 100%;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  #screen-frame{
    background: var(--screen-bezel);
    border-radius: 6px;
    padding: 8px;
    position:relative;
    box-shadow: inset 0 0 0 2px #0b0a0c, inset 0 2px 10px rgba(0,0,0,.6);
    display:flex;
  }
  #canvas-wrap{
    position:relative;
    line-height:0;
    max-width: 100%;
    max-height: calc(100dvh - 220px);
  }
  canvas{
    display:block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background:#000;
  }
  #placeholder{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:8px;
    color:#5b5764;
    font-family: var(--font-pixel);
    font-size: 9px;
    text-align:center;
    padding: 10px;
  }
  .shell-row{ display:flex; align-items:center; justify-content:space-between; padding: 0 4px; }
  .brand{ font-family: var(--font-pixel); font-size:8px; color: var(--shell-shadow); letter-spacing:1px; }
  .led{ width:7px; height:7px; border-radius:50%; background:#3a2f2f; box-shadow: inset 0 0 1px #000; }
  .led.live{ background: var(--ok); box-shadow: 0 0 5px var(--ok); }

  /* ---------- Controls ---------- */
  #controls{
    flex: 0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 18px calc(14px + env(safe-area-inset-bottom));
    gap: 10px;
  }
  #dpad{
    position:relative;
    width:132px; height:132px;
    touch-action:none;
  }
  #dpad svg{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  #dpad .zone-fill{ fill: var(--ink); stroke:#3a3540; stroke-width:1; }
  #dpad .arrow{ fill:#5b5764; }
  #dpad .arrow.active{ fill: var(--accent-red); }
  #dpad-touch{
    position:absolute; inset:0; border-radius:50%;
  }
  #dpad-center-dot{
    position:absolute; left:50%; top:50%; width:14px; height:14px;
    transform:translate(-50%,-50%); border-radius:50%;
    background:#0c0b0e; box-shadow: inset 0 0 3px #000;
    pointer-events:none;
  }

  #center-btns{ display:flex; flex-direction:column; align-items:center; gap:10px; }
  .pill-btn{
    font-family: var(--font-pixel);
    font-size: 7px;
    color:#2a2630;
    background: linear-gradient(180deg,#8c8798,#68626f);
    border-radius: 20px;
    padding: 8px 12px;
    width: 62px;
    text-align:center;
    box-shadow: 0 3px 0 #423e48, 0 4px 6px rgba(0,0,0,.4);
    cursor:pointer;
  }
  .pill-btn:active, .pill-btn.pressed{
    transform: translateY(2px);
    box-shadow: 0 1px 0 #423e48;
  }

  #ab-btns{
    position:relative;
    width:150px; height:110px;
    touch-action:none;
  }
  .ab-btn{
    position:absolute;
    width:64px; height:64px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-pixel);
    font-size: 18px;
    color:#f2e3d8;
    background: radial-gradient(circle at 35% 30%, var(--accent-red), var(--accent-red-dark));
    box-shadow: 0 4px 0 #661f1a, 0 6px 10px rgba(0,0,0,.45);
    touch-action:none;
  }
  .ab-btn:active, .ab-btn.pressed{
    transform: translateY(3px);
    box-shadow: 0 1px 0 #661f1a;
    filter: brightness(1.15);
  }
  #btn-b{ left:0; bottom:0; }
  #btn-a{ right:0; top:0; }

  footer{
    flex:0 0 auto;
    text-align:center;
    font-size: 10px;
    color:#5b5764;
    padding: 0 10px 8px;
  }
  footer kbd{
    background:#221f27; border:1px solid #3a3540; border-radius:4px;
    padding: 1px 5px; font-size:10px;
  }

  @media (orientation: landscape) and (max-height: 560px){
    #app{ flex-direction:column; }
    #loader{ display:none; }
    #main{
      display:flex;
      flex-direction:row;
      align-items:center;
      justify-content:space-between;
      flex:1 1 auto;
      min-height:0;
      padding: 6px 14px;
      gap: 10px;
    }
    #stage{ flex:1 1 auto; padding:0; order:2; }
    #canvas-wrap{ max-height: 88dvh; }
    #dpad{ order:1; }
    #ab-btns{ order:3; }
    #controls{ display:contents; }
    #center-btns{ display:none; }
    header{ padding: 4px 10px; }
  }

  #loader.hidden{ display:none; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo"><span class="dot"></span>NES // CARTRIDGE PLAYER</div>
    <div class="info-text" id="fps">FPS: 0 | Audio: OK</div>
    <div class="hdr-btns">
      <div class="icon-btn" id="btn-mute" title="Tắt/bật âm">🔊</div>
      <div class="icon-btn" id="btn-pause" title="Tạm dừng">⏸</div>
      <div class="icon-btn" id="btn-reset" title="Reset game">⟲</div>
      <div class="icon-btn" id="btn-fullscreen" title="Toàn màn hình">⛶</div>
    </div>
  </header>

  <div id="loader">
    <div class="slot-title">▸ NẠP BĂNG GAME (.NES)</div>
    <div class="slot-sub">Chạm để chọn file, hoặc kéo-thả ROM .nes vào đây</div>
    <input type="file" id="rom-input" accept=".nes" />
  </div>

  <div id="main">
    <div id="stage">
      <div id="shell">
        <div class="shell-row">
          <span class="brand">◆ NES-101</span>
          <span class="led" id="power-led"></span>
        </div>
        <div id="screen-frame">
          <div id="canvas-wrap">
            <canvas id="screen" width="256" height="240"></canvas>
            <div id="placeholder">CHƯA CÓ BĂNG GAME<br/>NẠP FILE .NES ĐỂ BẮT ĐẦU</div>
          </div>
        </div>
      </div>
    </div>

    <div id="controls">
      <div id="dpad">
        <svg viewBox="0 0 132 132">
          <path class="zone-fill" d="M44 4 H88 V44 H128 V88 H88 V128 H44 V88 H4 V44 H44 Z"/>
          <polygon class="arrow" id="arrow-up" points="66,14 58,30 74,30"/>
          <polygon class="arrow" id="arrow-down" points="66,118 58,102 74,102"/>
          <polygon class="arrow" id="arrow-left" points="14,66 30,58 30,74"/>
          <polygon class="arrow" id="arrow-right" points="118,66 102,58 102,74"/>
        </svg>
        <div id="dpad-touch"></div>
        <div id="dpad-center-dot"></div>
      </div>

      <div id="center-btns">
        <div class="pill-btn" id="btn-select">SELECT</div>
        <div class="pill-btn" id="btn-start">START</div>
      </div>

      <div id="ab-btns">
        <div class="ab-btn" id="btn-b">B</div>
        <div class="ab-btn" id="btn-a">A</div>
      </div>
    </div>
  </div>

  <footer>Bàn phím: <kbd>↑↓←→</kbd> di chuyển · <kbd>X</kbd>=A <kbd>Z</kbd>=B · <kbd>Enter</kbd>=Start <kbd>Shift</kbd>=Select</footer>
</div>

<script src="https://unpkg.com/jsnes@2/dist/jsnes.min.js"></script>
<script>
(function(){
  "use strict";

  // ===== CANVAS & RENDER (Optimized for speed) =====
  var canvas = document.getElementById('screen');
  var ctx = canvas.getContext('2d', { 
    alpha: false, 
    desynchronized: true, 
    willReadFrequently: false,
    antialias: false
  });
  ctx.imageSmoothingEnabled = false;
  
  // Create persistent ImageData for direct pixel manipulation
  var imageData = ctx.createImageData(256, 240);
  var buf32 = new Uint32Array(imageData.data.buffer);
  
  var placeholder = document.getElementById('placeholder');
  var powerLed = document.getElementById('power-led');
  var fpsDisplay = document.getElementById('fps');
  
  var skipRender = false;
  var frameCount = 0;
  var lastFpsUpdate = 0;

  // ===== AUDIO (Improved: better buffer management) =====
  var audioCtx = null;
  var scriptNode = null;
  var gainNode = null;
  var muted = false;
  var audioBuffer = {
    left: new Float32Array(4096),
    right: new Float32Array(4096),
    writeIdx: 0,
    readIdx: 0
  };
  var AUDIO_BUFFER_SIZE = 4096;

  function ensureAudio(){
    if (audioCtx) return;
    var AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC({ sampleRate: 44100 });
    
    gainNode = audioCtx.createGain();
    gainNode.gain.value = muted ? 0 : 0.3; // Softer default volume
    
    scriptNode = audioCtx.createScriptProcessor(2048, 0, 2);
    scriptNode.onaudioprocess = function(e){
      var outL = e.outputBuffer.getChannelData(0);
      var outR = e.outputBuffer.getChannelData(1);
      var n = outL.length;
      var avail = (audioBuffer.writeIdx - audioBuffer.readIdx + AUDIO_BUFFER_SIZE) % AUDIO_BUFFER_SIZE;
      
      if (avail >= n){
        for (var i = 0; i < n; i++){
          outL[i] = audioBuffer.left[audioBuffer.readIdx];
          outR[i] = audioBuffer.right[audioBuffer.readIdx];
          audioBuffer.readIdx = (audioBuffer.readIdx + 1) % AUDIO_BUFFER_SIZE;
        }
      } else {
        // Underrun - fill with silence
        for (var i = 0; i < n; i++){
          outL[i] = 0;
          outR[i] = 0;
        }
      }
    };
    
    scriptNode.connect(gainNode);
    gainNode.connect(audioCtx.destination);
  }

  // ===== NES CORE =====
  var nes = new jsnes.NES({
    onFrame: function(frameBuffer){
      if (skipRender) return;
      
      // Direct 32-bit copy (much faster than per-pixel)
      for (var i = 0; i < 256 * 240; i++){
        buf32[i] = 0xff000000 | frameBuffer[i];
      }
      
      ctx.putImageData(imageData, 0, 0);
      frameCount++;
    },
    onAudioSample: function(left, right){
      var nextIdx = (audioBuffer.writeIdx + 1) % AUDIO_BUFFER_SIZE;
      // Only write if buffer not full
      if (nextIdx !== audioBuffer.readIdx){
        audioBuffer.left[audioBuffer.writeIdx] = left;
        audioBuffer.right[audioBuffer.writeIdx] = right;
        audioBuffer.writeIdx = nextIdx;
      }
    },
    sampleRate: 44100
  });

  var romLoaded = false;
  var running = false;
  var rafId = null;
  var FRAME_MS = 1000 / 60.0988; // NES accurate rate
  var MAX_CATCHUP_FRAMES = 3; // Reduced from 4 for stability
  var lastRomData = null;
  var accumulator = 0;
  var lastTime = 0;

  // Performance monitoring
  var perfData = { fps: 0, audioStatus: 'OK' };
  setInterval(function(){
    perfData.fps = frameCount;
    frameCount = 0;
    fpsDisplay.textContent = 'FPS: ' + perfData.fps + ' | Audio: ' + perfData.audioStatus;
  }, 1000);

  function tick(now){
    rafId = requestAnimationFrame(tick);
    if (!running || !romLoaded) return;
    
    if (!lastTime) lastTime = now;
    var delta = now - lastTime;
    lastTime = now;
    
    // Clamp delta to avoid spiral on tab resume
    if (delta > 250) delta = 250;
    if (delta < 0) delta = 0;
    
    accumulator += delta;
    
    var framesToRun = 0;
    while (accumulator >= FRAME_MS && framesToRun < MAX_CATCHUP_FRAMES){
      accumulator -= FRAME_MS;
      framesToRun++;
    }
    
    if (framesToRun === 0) return;
    
    for (var i = 0; i < framesToRun; i++){
      skipRender = (i < framesToRun - 1);
      nes.frame();
    }
    
    // Update audio status
    if (audioCtx){
      var avail = (audioBuffer.writeIdx - audioBuffer.readIdx + AUDIO_BUFFER_SIZE) % AUDIO_BUFFER_SIZE;
      if (avail < 512) perfData.audioStatus = 'LOW';
      else if (avail > 3500) perfData.audioStatus = 'HIGH';
      else perfData.audioStatus = 'OK';
    }
  }

  function startLoop(){
    if (running) return;
    running = true;
    lastTime = 0;
    accumulator = 0;
    powerLed.classList.add('live');
    if (rafId === null) rafId = requestAnimationFrame(tick);
  }

  function stopLoop(){
    running = false;
    powerLed.classList.remove('live');
  }

  function loadRom(data){
    try {
      nes.loadROM(data);
      lastRomData = data;
      romLoaded = true;
      placeholder.style.display = 'none';
      
      ensureAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      startLoop();
      document.getElementById('loader').classList.add('hidden');
    } catch(err){
      alert('Không đọc đ��ợc ROM này: ' + err.message);
    }
  }

  // ===== FILE LOADING =====
  var loaderEl = document.getElementById('loader');
  var fileInput = document.getElementById('rom-input');
  
  loaderEl.addEventListener('click', function(){ fileInput.click(); });
  
  fileInput.addEventListener('change', function(){
    var f = fileInput.files[0];
    if (!f) return;
    readFile(f);
  });
  
  ['dragover'].forEach(function(evt){
    loaderEl.addEventListener(evt, function(e){ 
      e.preventDefault(); 
      loaderEl.classList.add('drag'); 
    });
  });
  
  ['dragleave','drop'].forEach(function(evt){
    loaderEl.addEventListener(evt, function(e){ 
      e.preventDefault(); 
      loaderEl.classList.remove('drag'); 
    });
  });
  
  loaderEl.addEventListener('drop', function(e){
    e.preventDefault();
    var f = e.dataTransfer.files[0];
    if (f) readFile(f);
  });
  
  function readFile(f){
    // Use ArrayBuffer instead of deprecated readAsBinaryString
    var reader = new FileReader();
    reader.onload = function(){
      var arr = new Uint8Array(reader.result);
      loadRom(arr);
    };
    reader.readAsArrayBuffer(f);
  }

  // ===== HEADER BUTTONS =====
  document.getElementById('btn-mute').addEventListener('click', function(e){
    ensureAudio();
    muted = !muted;
    gainNode.gain.value = muted ? 0 : 0.3;
    e.currentTarget.textContent = muted ? '🔇' : '🔊';
    e.currentTarget.classList.toggle('on', muted);
  });
  
  document.getElementById('btn-pause').addEventListener('click', function(e){
    if (!romLoaded) return;
    if (running){
      stopLoop();
      e.currentTarget.textContent = '▶';
      e.currentTarget.classList.add('on');
    } else {
      startLoop();
      e.currentTarget.textContent = '⏸';
      e.currentTarget.classList.remove('on');
    }
  });
  
  document.getElementById('btn-reset').addEventListener('click', function(){
    if (lastRomData){
      stopLoop();
      loadRom(lastRomData);
    }
  });
  
  document.getElementById('btn-fullscreen').addEventListener('click', function(e){
    var el = document.getElementById('app');
    if (!document.fullscreenElement){
      el.requestFullscreen?.call(el) || el.webkitRequestFullscreen?.call(el);
      e.currentTarget.classList.add('on');
    } else {
      document.exitFullscreen?.call(document) || document.webkitExitFullscreen?.call(document);
      e.currentTarget.classList.remove('on');
    }
  });

  // ===== CONTROLLER =====
  var C = jsnes.Controller;
  function vibrate(ms){ if (navigator.vibrate) navigator.vibrate(ms); }
  function down(btn){ nes.buttonDown(1, btn); }
  function up(btn){ nes.buttonUp(1, btn); }

  // D-Pad: 8-way angle detection
  var dpadTouch = document.getElementById('dpad-touch');
  var dpadActivePointer = null;
  var dpadState = { up:false, down:false, left:false, right:false };
  var arrowEls = {
    up: document.getElementById('arrow-up'),
    down: document.getElementById('arrow-down'),
    left: document.getElementById('arrow-left'),
    right: document.getElementById('arrow-right')
  };

  function setDir(dir, active){
    if (dpadState[dir] === active) return;
    dpadState[dir] = active;
    var map = { up:C.BUTTON_UP, down:C.BUTTON_DOWN, left:C.BUTTON_LEFT, right:C.BUTTON_RIGHT };
    if (active){
      down(map[dir]);
      arrowEls[dir].classList.add('active');
    } else {
      up(map[dir]);
      arrowEls[dir].classList.remove('active');
    }
  }

  function clearDpad(){
    setDir('up', false);
    setDir('down', false);
    setDir('left', false);
    setDir('right', false);
  }

  function updateDpadFromPoint(clientX, clientY){
    var rect = dpadTouch.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var dx = clientX - cx;
    var dy = clientY - cy;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var deadzone = rect.width * 0.16;
    
    if (dist < deadzone){
      clearDpad();
      return;
    }
    
    var angle = Math.atan2(dy, dx) * 180 / Math.PI;
    var up = angle < -22.5 && angle > -157.5;
    var down = angle > 22.5 && angle < 157.5;
    var right = angle >= -67.5 && angle <= 67.5;
    var left = angle >= 112.5 || angle <= -112.5;
    
    setDir('up', up);
    setDir('down', down);
    setDir('left', left);
    setDir('right', right);
  }

  dpadTouch.addEventListener('pointerdown', function(e){
    if (dpadActivePointer !== null) return;
    dpadActivePointer = e.pointerId;
    dpadTouch.setPointerCapture(e.pointerId);
    updateDpadFromPoint(e.clientX, e.clientY);
    vibrate(8);
  });

  dpadTouch.addEventListener('pointermove', function(e){
    if (e.pointerId !== dpadActivePointer) return;
    updateDpadFromPoint(e.clientX, e.clientY);
  });

  function dpadRelease(e){
    if (e.pointerId !== dpadActivePointer) return;
    dpadActivePointer = null;
    clearDpad();
  }

  dpadTouch.addEventListener('pointerup', dpadRelease);
  dpadTouch.addEventListener('pointercancel', dpadRelease);

  // Button binding (supports multitouch)
  function bindButton(el, jsBtn, opts){
    opts = opts || {};
    var activePointers = new Set();
    
    function press(id){
      if (activePointers.has(id)) return;
      activePointers.add(id);
      if (activePointers.size === 1){
        down(jsBtn);
        el.classList.add('pressed');
        vibrate(opts.strong ? 15 : 8);
      }
    }
    
    function release(id){
      if (!activePointers.has(id)) return;
      activePointers.delete(id);
      if (activePointers.size === 0){
        up(jsBtn);
        el.classList.remove('pressed');
      }
    }
    
    el.addEventListener('pointerdown', function(e){
      el.setPointerCapture(e.pointerId);
      press(e.pointerId);
    });
    el.addEventListener('pointerup', function(e){ release(e.pointerId); });
    el.addEventListener('pointercancel', function(e){ release(e.pointerId); });
    el.addEventListener('pointerleave', function(e){
      if (e.buttons === 0) release(e.pointerId);
    });
    
    return { 
      press: function(){ press('kbd'); },
      release: function(){ release('kbd'); }
    };
  }

  var btnA = bindButton(document.getElementById('btn-a'), C.BUTTON_A, { strong:true });
  var btnB = bindButton(document.getElementById('btn-b'), C.BUTTON_B, { strong:true });
  var btnStart = bindButton(document.getElementById('btn-start'), C.BUTTON_START);
  var btnSelect = bindButton(document.getElementById('btn-select'), C.BUTTON_SELECT);

  // Keyboard support
  var keyMap = {
    ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right'
  };
  
  window.addEventListener('keydown', function(e){
    if (keyMap[e.key]){
      setDir(keyMap[e.key], true);
      e.preventDefault();
      return;
    }
    if (e.key === 'x' || e.key === 'X'){ btnA.press(); e.preventDefault(); }
    else if (e.key === 'z' || e.key === 'Z'){ btnB.press(); e.preventDefault(); }
    else if (e.key === 'Enter'){ btnStart.press(); e.preventDefault(); }
    else if (e.key === 'Shift'){ btnSelect.press(); e.preventDefault(); }
  });
  
  window.addEventListener('keyup', function(e){
    if (keyMap[e.key]){
      setDir(keyMap[e.key], false);
      e.preventDefault();
      return;
    }
    if (e.key === 'x' || e.key === 'X'){ btnA.release(); e.preventDefault(); }
    else if (e.key === 'z' || e.key === 'Z'){ btnB.release(); e.preventDefault(); }
    else if (e.key === 'Enter'){ btnStart.release(); e.preventDefault(); }
    else if (e.key === 'Shift'){ btnSelect.release(); e.preventDefault(); }
  });

  // Audio context unlock on first interaction
  document.body.addEventListener('pointerdown', function(){
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }, { passive:true });

})();
</script>
</body>
</html>
