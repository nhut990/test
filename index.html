<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Timemark Camera</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        #camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        video {
            width: 100%;
            display: block;
        }
        /* Giao diện hiển thị đè chữ lên camera lúc đang xem (Preview) */
        #watermark-overlay {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            font-size: 14px;
            pointer-events: none;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 5px;
        }
        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        h3 { margin-top: 30px; }
        #result-image {
            max-width: 100%;
            width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h2>Timemark Web Camera</h2>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <div id="watermark-overlay">Đang tải vị trí và thời gian...</div>
    </div>

    <button id="snap">Chụp Ảnh</button>

    <canvas id="canvas" style="display:none;"></canvas>

    <h3>Ảnh kết quả:</h3>
    <div id="result-container">
        <p style="color: #666;">Chưa có ảnh nào được chụp.</p>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');
    const watermarkOverlay = document.getElementById('watermark-overlay');
    const resultContainer = document.getElementById('result-container');

    let currentCoords = "Chưa có tọa độ";

    // 1. Lấy tọa độ GPS từ trình duyệt
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((position) => {
            const lat = position.coords.latitude.toFixed(6);
            const lon = position.coords.longitude.toFixed(6);
            currentCoords = `Tọa độ: ${lat}, ${lon}`;
        }, (error) => {
            currentCoords = "Không thể lấy vị trí (Chưa cấp quyền)";
        }, { enableHighAccuracy: true });
    } else {
        currentCoords = "Trình duyệt không hỗ trợ GPS";
    }

    // 2. Cập nhật thời gian thực lên màn hình preview
    function updateOverlay() {
        const now = new Date();
        const timeStr = now.toLocaleString('vi-VN'); // Định dạng ngày giờ VN
        watermarkOverlay.innerHTML = `${timeStr}<br>${currentCoords}`;
        requestAnimationFrame(updateOverlay);
    }
    updateOverlay();

    // 3. Kích hoạt Camera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
        .then((stream) => {
            video.srcObject = stream;
        })
        .catch((err) => {
            console.error("Lỗi truy cập camera: ", err);
            alert("Vui lòng cấp quyền truy cập camera!");
        });

    // 4. Xử lý sự kiện CHỤP ẢNH
    snap.addEventListener('click', () => {
        // Đặt kích thước canvas bằng với kích thước thật của luồng video
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const ctx = canvas.getContext('2d');
        
        // Vẽ hình ảnh từ video lên canvas
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Thiết lập font chữ và màu sắc cho watermark (tỷ lệ theo kích thước ảnh)
        const fontSize = Math.max(16, Math.floor(canvas.width * 0.035)); 
        ctx.font = `bold ${fontSize}px Arial`;
        ctx.fillStyle = "white";
        
        // Tạo đổ bóng cho chữ để dễ đọc trên nền sáng
        ctx.shadowColor = "black";
        ctx.shadowBlur = 6;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;

        // Chuẩn bị nội dung chữ
        const now = new Date();
        const timeStr = now.toLocaleString('vi-VN');
        
        // Vẽ chữ lên góc dưới bên trái của ảnh
        const marginX = canvas.width * 0.04;
        const marginY = canvas.height * 0.05;
        
        // Vẽ dòng tọa độ trước (dưới cùng) rồi tới dòng thời gian
        ctx.fillText(currentCoords, marginX, canvas.height - marginY);
        ctx.fillText(timeStr, marginX, canvas.height - marginY - (fontSize * 1.3));

        // Xuất canvas thành file ảnh (base64) và hiển thị ra màn hình
        const dataURL = canvas.toDataURL('image/jpeg');
        resultContainer.innerHTML = `<img id="result-image" src="${dataURL}" alt="Captured Image"><br><a href="${dataURL}" download="timemark_${Date.now()}.jpg"><button style="background-color: #28a745;">Tải ảnh về máy</button></a>`;
    });
</script>

</body>
</html>
