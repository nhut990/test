<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cài Đặt Ứng Dụng iOS Phiên Bản Cũ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(ellipse at top left, #232526 0%, #434343 70%, #000 100%);
      color: #fff;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 600px; margin: auto; }
    
    .title-row { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 12px; 
      margin-bottom: 25px;
      flex-wrap: wrap;
      width: 100%;
    }
    
    .title-row img { 
      width: 50px; 
      height: 50px; 
      min-width: 50px;
      min-height: 50px;
      object-fit: contain; 
      filter: drop-shadow(0 2px 8px #fff8); 
      background: #fff; 
      border-radius: 12px; 
      padding: 6px; 
      box-shadow: 0 2px 16px #0007;
      flex-shrink: 0;
      -webkit-border-radius: 12px;
      -webkit-box-shadow: 0 2px 16px #0007;
    }
    
    h1 { 
      margin: 0; 
      color: #ff5555; 
      font-size: 1.6rem; 
      font-weight: bold; 
      text-align: center; 
      letter-spacing: 0.5px; 
      text-shadow: 0 2px 6px #000c;
      line-height: 1.3;
      word-break: break-word;
    }
    
    .app-list { 
      display: flex; 
      flex-direction: column; 
      gap: 15px;
    }
    
    .app { 
      background: rgba(255, 255, 255, 0.10); 
      border-radius: 10px; 
      padding: 12px 14px; 
      margin: 0 auto;
      box-shadow: 0 0 8px 2px rgba(0,0,0,0.25); 
      max-width: 100%;
      width: 100%;
      transition: box-shadow 0.15s;
      box-sizing: border-box;
      -webkit-border-radius: 10px;
      -webkit-box-shadow: 0 0 8px 2px rgba(0,0,0,0.25);
    }
    
    .app-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      cursor: pointer; 
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    
    .app-header h2 { 
      font-size: 1.1rem; 
      margin: 0; 
      font-weight: 600; 
      letter-spacing: 0.3px; 
      display: flex; 
      align-items: center; 
      gap: 8px;
      flex: 1;
      word-break: break-word;
    }
    
    .app-header span { 
      font-size: 1.2rem; 
      margin-left: 10px; 
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    
    .app-header:active { 
      opacity: 0.8;
    }
    
    .app-icon { 
      width: 28px; 
      height: 28px; 
      min-width: 28px;
      min-height: 28px;
      object-fit: contain; 
      border-radius: 6px; 
      box-shadow: 0 2px 8px #0005; 
      background: #fff; 
      flex-shrink: 0;
      -webkit-border-radius: 6px;
      -webkit-box-shadow: 0 2px 8px #0005;
    }
    
    .versions { 
      display: none; 
      margin-top: 10px;
    }
    
    .version { 
      background: rgba(255,255,255,0.15); 
      border-radius: 7px; 
      padding: 8px 10px; 
      margin-bottom: 8px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      gap: 10px;
      box-sizing: border-box;
      -webkit-border-radius: 7px;
    }
    
    .version-info { 
      display: flex; 
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }
    
    .version-info span {
      word-break: break-word;
    }
    
    .version .ver-icon { 
      width: 20px; 
      height: 20px;
      min-width: 20px;
      min-height: 20px;
      object-fit: contain; 
      border-radius: 4px; 
      background: #fff; 
      margin-right: 6px; 
      vertical-align: middle; 
      box-shadow: 0 2px 6px #0003;
      flex-shrink: 0;
      -webkit-border-radius: 4px;
      -webkit-box-shadow: 0 2px 6px #0003;
      display: inline-block;
    }
    
    .ios-support { 
      color: #90caf9; 
      font-size: 0.9rem; 
      font-weight: 400; 
      margin-top: 3px;
    }
    
    .btn { 
      background: #64b5f6; 
      color: #000; 
      border: none; 
      border-radius: 6px; 
      padding: 6px 12px; 
      cursor: pointer; 
      font-weight: bold; 
      font-size: 0.9rem; 
      transition: background 0.15s;
      flex-shrink: 0;
      -webkit-border-radius: 6px;
      -webkit-appearance: none;
    }
    
    .btn:active { 
      background: #43a047; 
      color: #fff;
    }
    
    .footer { 
      text-align: center; 
      margin-top: 40px; 
      font-size: 1.05rem; 
      color: #fff; 
      letter-spacing: 0.5px; 
      opacity: 0.8; 
      user-select: none;
      -webkit-user-select: none;
    }
    
    .blinker { 
      display: inline-block; 
      animation: blink 1.2s infinite alternate; 
      font-weight: bold;
    }
    
    .blinker2 { 
      display: inline-block; 
      animation: blink2 1.2s infinite alternate; 
      font-weight: bold;
    }
    
    @keyframes blink { 
      from { color: #ff5555; text-shadow: 0 0 10px #ff555599; } 
      to { color: #64b5f6; text-shadow: 0 0 10px #64b5f699; } 
    }
    
    @keyframes blink2 { 
      from { color: #64b5f6; text-shadow: 0 0 10px #64b5f699; } 
      to { color: #ff5555; text-shadow: 0 0 10px #ff555599; } 
    }
    
    .back-home { 
      display: inline-block; 
      margin-bottom: 10px; 
      padding: 9px 16px; 
      background: #fff2; 
      color: #64b5f6; 
      border-radius: 6px; 
      text-decoration: none; 
      font-weight: bold; 
      font-size: 0.95rem; 
      box-shadow: 0 2px 8px #0006; 
      transition: background 0.18s, color 0.18s;
      -webkit-border-radius: 6px;
      -webkit-box-shadow: 0 2px 8px #0006;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: rgba(0,0,0,0);
    }
    
    .back-home:active { 
      background: #64b5f6; 
      color: #fff;
    }
    
    .page2-link { 
      display: inline-block; 
      margin-bottom: 10px; 
      margin-left: 0; 
      padding: 9px 16px; 
      background: #fff2; 
      color: #ff5555; 
      border-radius: 6px; 
      text-decoration: none; 
      font-weight: bold; 
      font-size: 0.95rem; 
      box-shadow: 0 2px 8px #0006; 
      transition: background 0.18s, color 0.18s;
      -webkit-border-radius: 6px;
      -webkit-box-shadow: 0 2px 8px #0006;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: rgba(0,0,0,0);
    }
    
    .page2-link:active { 
      background: #ff5555; 
      color: #fff;
    }
    
    .note-app-id { 
      text-align: center; 
      color: #bbb; 
      font-size: 0.95rem; 
      margin: 24px 0 0 0; 
      font-style: italic; 
      letter-spacing: 0.3px; 
      user-select: none;
      -webkit-user-select: none;
      line-height: 1.4;
    }
    
    @media (max-width: 600px) {
      body {
        padding: 15px;
      }
      .title-row { 
        gap: 10px;
        margin-bottom: 20px;
      }
      .title-row img {
        width: 45px;
        height: 45px;
      }
      h1 { 
        font-size: 1.3rem; 
      }
      .app-header h2 {
        font-size: 1rem;
      }
      .footer { 
        font-size: 0.95rem; 
      }
      .back-home { 
        font-size: 0.9rem; 
      }
      .page2-link { 
        font-size: 0.9rem; 
      }
    }

    @media (max-width: 400px) {
      h1 { 
        font-size: 1.1rem;
        letter-spacing: 0;
      }
      .title-row img {
        width: 40px;
        height: 40px;
      }
      .app-header h2 {
        font-size: 0.95rem;
      }
    }
  </style>
