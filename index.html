<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy tính thông minh · biểu thức đầy đủ + cuộn lịch sử</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b2f3a 0%, #1e2129 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .calculator {
            max-width: 460px;
            width: 100%;
            background: #1b1e26;
            border-radius: 2.2rem;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06) inset;
            padding: 25px 22px 30px 22px;
        }

        /* history header + thùng rác */
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 0 6px;
        }
        .history-header span {
            color: #b9c4dd;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            opacity: 0.7;
        }
        .delete-all-btn {
            background: #2d3440;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ecb2b2;
            font-size: 22px;
            box-shadow: 0 4px 0 #171c24, 0 3px 8px black;
            transition: 0.07s ease;
            border: 1px solid #505e72;
        }
        .delete-all-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a1f28;
        }
        .delete-all-btn:hover {
            background: #3e485a;
            color: #ffcaca;
        }

        /* khung history có thể cuộn */
        .history-panel {
            background: #12141c;
            border-radius: 24px;
            padding: 12px 12px 8px 12px;
            margin-bottom: 18px;
            border: 1px solid #333842;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.6);
            max-height: 170px;         /* đủ chứa khoảng 5 dòng, sau đó cuộn */
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #3d4b5e #1a1e2a;
        }
        .history-panel::-webkit-scrollbar {
            width: 6px;
        }
        .history-panel::-webkit-scrollbar-track {
            background: #1a1e2a;
            border-radius: 10px;
        }
        .history-panel::-webkit-scrollbar-thumb {
            background: #3d4b5e;
            border-radius: 10px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            color: #a5b0c5;
            font-size: 19px;
            font-weight: 400;
            display: flex;
            align-items: baseline;
            line-height: 1.4;
            border-bottom: 1px dashed #2e3440;
            padding-bottom: 5px;
            padding-right: 5px;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-op {
            color: #b7c5e0;
            font-weight: 300;
            margin-right: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .history-eq {
            color: #69758b;
            margin: 0 6px;
            flex-shrink: 0;
        }
        .history-result {
            color: #ebf0ff;
            font-weight: 500;
            margin-left: auto;
            background: #282e3c;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 18px;
            box-shadow: inset 0 1px 3px #0a0c12;
            white-space: nowrap;
        }

        .empty-history-msg {
            color: #3f4a5a;
            text-align: center;
            font-size: 16px;
            padding: 16px 0;
            font-style: italic;
        }

        /* màn hình chia 2 dòng: biểu thức (trên) và kết quả/số nhập (dưới) */
        .display-area {
            background: #0f1118;
            border-radius: 26px;
            padding: 14px 20px 10px 20px;
            margin-bottom: 20px;
            border: 1px solid #3b4252;
            box-shadow: 0 5px 0 #080a0e;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        #expression-display {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #9aa9c1;
            font-size: 18px;
            font-weight: 300;
            text-align: right;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow-x: auto;
            padding-bottom: 2px;
            border-bottom: 1px dashed #2f384b;
        }
        #calc-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #f2f4fa;
            font-size: 36px;
            font-weight: 400;
            text-align: right;
        }

        /* grid nút bấm */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 10px;
        }
        .btn {
            background: #262c38;
            border: none;
            border-radius: 28px;
            padding: 18px 0;
            font-size: 26px;
            font-weight: 500;
            color: #e5eaf5;
            box-shadow: 0 6px 0 #12161d, 0 5px 12px rgba(0,0,0,0.5);
            transition: 0.05s linear;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            border: 1px solid #404b5a;
            border-bottom-width: 2px;
            user-select: none;
        }
        /* hiệu ứng nhấn: sáng vàng và tụt xuống */
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #0e1219, 0 5px 10px black;
            background: #556b86 !important;         /* màu sáng nổi bật khi nhấn */
            color: white;
            border-color: #89a1c2;
        }
        /* giữ lại màu sắc cho từng loại khi nhấn (không bị mất màu sắc riêng) */
        .btn.top-action:active {
            background: #657b9c !important;
        }
        .btn.operator:active {
            background: #6d7f9e !important;
            color: #ffeca0;
        }
        .btn.equals:active {
            background: #5f7eb0 !important;
        }

        .btn.top-action {
            background: #384153;
            color: #fffbee;
            border-color: #5e6b80;
        }
        .btn.operator {
            background: #31435b;
            color: #ffd898;
            border-color: #5c6f8a;
            font-size: 30px;
            font-weight: 600;
        }
        .btn.equals {
            background: #3d5d8c;
            border-color: #6a8fc0;
            color: white;
            font-size: 32px;
            box-shadow: 0 6px 0 #1f3147;
        }
        .btn.dot {
            font-size: 36px;
            padding-bottom: 22px;
        }
        .trash-icon {
            font-size: 24px;
            line-height: 1;
        }
    </style>
</head>
<body>
<div class="calculator">
    <!-- header lịch sử + thùng rác -->
    <div class="history-header">
        <span>Lịch sử</span>
        <button class="delete-all-btn" id="deleteAllHistoryBtn" title="Xoá tất cả lịch sử">
            <span class="trash-icon">🗑️</span>
        </button>
    </div>

    <!-- khung lịch sử cuộn được -->
    <div class="history-panel">
        <div class="history-list" id="historyContainer"></div>
    </div>

    <!-- màn hình: biểu thức (dòng trên) + kết quả/số hiện tại (dòng dưới) -->
    <div class="display-area">
        <input type="text" id="expression-display" readonly placeholder=" " value=" ">
        <input type="text" id="calc-input" readonly placeholder="0" value="0">
    </div>

    <!-- bảng nút -->
    <div class="button-grid">
        <!-- Hàng 1 -->
        <button class="btn top-action" id="clearBtn">C</button>
        <button class="btn top-action" id="plusMinusBtn">±</button>
        <button class="btn top-action" id="percentBtn">%</button>
        <button class="btn operator" id="divideBtn">÷</button>

        <!-- Hàng 2 -->
        <button class="btn" id="num7">7</button>
        <button class="btn" id="num8">8</button>
        <button class="btn" id="num9">9</button>
        <button class="btn operator" id="multiplyBtn">×</button>

        <!-- Hàng 3 -->
        <button class="btn" id="num4">4</button>
        <button class="btn" id="num5">5</button>
        <button class="btn" id="num6">6</button>
        <button class="btn operator" id="minusBtn">−</button>

        <!-- Hàng 4 -->
        <button class="btn" id="num1">1</button>
        <button class="btn" id="num2">2</button>
        <button class="btn" id="num3">3</button>
        <button class="btn operator" id="plusBtn">+</button>

        <!-- Hàng 5 -->
        <button class="btn" id="num0">0</button>
        <button class="btn dot" id="dotBtn">.</button>
        <button class="btn equals" id="equalsBtn">=</button>
    </div>
</div>

<script>
    (function() {
        // State
        let currentInput = '0';               // số hiện tại (màn hình dưới)
        let expressionStr = '';                // biểu thức đang xây dựng (màn hình trên)
        let previousOperand = null;
        let pendingOperator = null;
        let shouldResetInput = false;
        let historyItems = [];                  // lưu tất cả lịch sử, hiển thị nhiều, cuộn

        const inputField = document.getElementById('calc-input');
        const exprField = document.getElementById('expression-display');
        const historyContainer = document.getElementById('historyContainer');
        const deleteAllBtn = document.getElementById('deleteAllHistoryBtn');

        // Hàm cập nhật màn hình biểu thức (dòng trên) và kết quả (dòng dưới)
        function updateDisplays() {
            inputField.value = currentInput;
            exprField.value = expressionStr || ' '; // nếu rỗng thì hiện khoảng trống
        }

        // Hiển thị lịch sử - tất cả các mục, cuộn khi nhiều
        function renderHistory() {
            if (historyItems.length === 0) {
                historyContainer.innerHTML = `<div class="empty-history-msg">⋯ chưa có phép tính</div>`;
                return;
            }
            let html = '';
            // hiển thị toàn bộ (mới nhất ở trên)
            for (let item of historyItems) {
                html += `<div class="history-item">
                    <span class="history-op">${item.operation}</span>
                    <span class="history-eq">=</span>
                    <span class="history-result">${item.result}</span>
                </div>`;
            }
            historyContainer.innerHTML = html;
            // cuộn xuống dưới cùng để xem lịch sử cũ nhất (tuỳ chọn, có thể cuộn lên trên để thấy mới)
            // để mới nhất ở trên, nên muốn xem cũ thì cuộn xuống, không tự động cuộng
        }

        // Thêm một phép tính vào lịch sử (khi nhấn = hoặc sau khi tính toán)
        function addHistory(operation, result) {
            historyItems.unshift({ operation, result });  // thêm vào đầu (gần nhất)
            // Không giới hạn số lượng, nhưng vì giao diện cuộn được nên lưu nhiều.
            // nếu muốn giới hạn bộ nhớ có thể giữ 50, nhưng không cần lắm.
            if (historyItems.length > 50) historyItems.pop(); // vẫn giới hạn 50, nhưng cuộn tốt
            renderHistory();
        }

        // Xoá toàn bộ lịch sử
        function deleteAllHistory() {
            historyItems = [];
            renderHistory();
        }

        // Reset toàn bộ máy tính (C)
        function clearAll() {
            currentInput = '0';
            expressionStr = '';
            previousOperand = null;
            pendingOperator = null;
            shouldResetInput = false;
            updateDisplays();
        }

        // Nhập số
        function inputNumber(num) {
            if (shouldResetInput) {
                currentInput = '';
                shouldResetInput = false;
            }
            if (currentInput === '0' && num === '0') {
                return;
            }
            if (currentInput === '0' && num !== '.') {
                currentInput = num;
            } else {
                if (currentInput.replace('-','').replace('.','').length < 14) {
                    currentInput += num;
                }
            }
            // Cập nhật biểu thức: nếu đang xây dựng thì không tự động thay đổi biểu thức ở đây,
            // biểu thức được cập nhật khi nhấn operator hoặc bằng. 
            // Tuy nhiên, để thân thiện, khi nhập số ta cũng muốn biểu thức thể hiện số hiện tại?
            // Nhưng theo luồng: người dùng muốn thấy biểu thức đầy đủ, ta sẽ xây dựng expressionStr trong handleOperator và handleEquals.
            // Nếu expressionStr đang rỗng và chưa có toán tử, ta có thể hiển thị số hiện tại trên biểu thức?
            // Để giống máy tính: biểu thức hiển thị những gì đã nhập trước đó (ví dụ "10+65+66")
            if (!pendingOperator && previousOperand === null) {
                // Trường hợp chưa có toán tử nào, biểu thức nên là số hiện tại? nhưng để trống hoặc chỉ số hiện tại
                expressionStr = currentInput;
            } else {
                // giữ nguyên biểu thức (đã được cập nhật khi nhấn operator)
            }
            updateDisplays();
        }

        // Dấu chấm
        function inputDot() {
            if (shouldResetInput) {
                currentInput = '0';
                shouldResetInput = false;
            }
            if (!currentInput.includes('.')) {
                currentInput += '.';
            }
            updateDisplays();
        }

        // Đổi dấu
        function toggleSign() {
            if (currentInput !== '0' && currentInput !== '') {
                if (currentInput.startsWith('-')) {
                    currentInput = currentInput.substring(1);
                } else {
                    currentInput = '-' + currentInput;
                }
                updateDisplays();
            }
        }

        // Phần trăm
        function percent() {
            if (currentInput) {
                let val = parseFloat(currentInput) / 100;
                currentInput = String(val);
                updateDisplays();
            }
        }

        // Tính toán
        function compute(op, left, right) {
            const a = parseFloat(left);
            const b = parseFloat(right);
            if (isNaN(a) || isNaN(b)) return NaN;
            switch (op) {
                case '+': return a + b;
                case '−': return a - b;
                case '×': return a * b;
                case '÷': return a / b;
                default: return b;
            }
        }

        // Xây dựng biểu thức để hiển thị
        function buildExpression(prev, op, curr) {
            if (prev === null) return curr;
            return `${prev} ${op} ${curr}`;
        }

        // Xử lý phép toán
        function handleOperator(opSymbol) {
            if (pendingOperator !== null && previousOperand !== null && !shouldResetInput) {
                // tính kết quả trước
                let result = compute(pendingOperator, previousOperand, currentInput);
                if (!isNaN(result) && isFinite(result)) {
                    let operationStr = `${previousOperand} ${pendingOperator} ${currentInput}`;
                    result = Math.round((result + Number.EPSILON) * 1e12) / 1e12;
                    let resultStr = String(result);
                    // Lưu lịch sử
                    addHistory(operationStr, resultStr);
                    // Cập nhật các toán hạng
                    previousOperand = result;
                    currentInput = resultStr;
                    // Biểu thức hiển thị sẽ là phép tính vừa thực hiện, nhưng sau đó lại gắn thêm opSymbol mới?
                    expressionStr = `${previousOperand} ${opSymbol}`;
                } else {
                    currentInput = 'Error';
                    previousOperand = null;
                    pendingOperator = null;
                    expressionStr = '';
                    updateDisplays();
                    return;
                }
            } else {
                // chưa có toán tử chờ
                if (previousOperand === null) {
                    previousOperand = currentInput;
                    expressionStr = `${previousOperand} ${opSymbol}`;
                } else {
                    // đã có previousOperand và chưa có pendingOperator? (trường hợp đổi ý chọn toán tử khác)
                    // gán lại toán tử mới
                    expressionStr = `${previousOperand} ${opSymbol}`;
                }
            }
            pendingOperator = opSymbol;
            shouldResetInput = true;
            updateDisplays();
        }

        // Xử lý dấu bằng
        function handleEquals() {
            if (pendingOperator !== null && previousOperand !== null && !shouldResetInput) {
                let result = compute(pendingOperator, previousOperand, currentInput);
                if (!isNaN(result) && isFinite(result)) {
                    let operationStr = `${previousOperand} ${pendingOperator} ${currentInput}`;
                    result = Math.round((result + Number.EPSILON) * 1e12) / 1e12;
                    let resultStr = String(result);
                    addHistory(operationStr, resultStr);
                    // Sau khi bằng, biểu thức hiện phép tính đã hoàn thành (có thể để lại kết quả)
                    expressionStr = operationStr + ' =';   // ví dụ "10+65+66 ="
                    currentInput = resultStr;
                    previousOperand = null;
                    pendingOperator = null;
                    shouldResetInput = true;
                } else {
                    currentInput = 'Error';
                    previousOperand = null;
                    pendingOperator = null;
                    expressionStr = '';
                    shouldResetInput = true;
                }
            } else {
                // Nếu không có phép toán, vẫn clear để nhập mới
                shouldResetInput = true;
                // giữ nguyên biểu thức? nên reset biểu thức
                expressionStr = '';
            }
            updateDisplays();
        }

        // Gán sự kiện
        document.getElementById('clearBtn').addEventListener('click', clearAll);
        document.getElementById('plusMinusBtn').addEventListener('click', toggleSign);
        document.getElementById('percentBtn').addEventListener('click', percent);
        document.getElementById('divideBtn').addEventListener('click', () => handleOperator('÷'));
        document.getElementById('multiplyBtn').addEventListener('click', () => handleOperator('×'));
        document.getElementById('minusBtn').addEventListener('click', () => handleOperator('−'));
        document.getElementById('plusBtn').addEventListener('click', () => handleOperator('+'));
        document.getElementById('equalsBtn').addEventListener('click', handleEquals);
        document.getElementById('dotBtn').addEventListener('click', inputDot);
        document.getElementById('num0').addEventListener('click', () => inputNumber('0'));
        document.getElementById('num1').addEventListener('click', () => inputNumber('1'));
        document.getElementById('num2').addEventListener('click', () => inputNumber('2'));
        document.getElementById('num3').addEventListener('click', () => inputNumber('3'));
        document.getElementById('num4').addEventListener('click', () => inputNumber('4'));
        document.getElementById('num5').addEventListener('click', () => inputNumber('5'));
        document.getElementById('num6').addEventListener('click', () => inputNumber('6'));
        document.getElementById('num7').addEventListener('click', () => inputNumber('7'));
        document.getElementById('num8').addEventListener('click', () => inputNumber('8'));
        document.getElementById('num9').addEventListener('click', () => inputNumber('9'));

        deleteAllBtn.addEventListener('click', deleteAllHistory);

        // Khởi tạo
        clearAll();  // đặt về 0 và biểu thức rỗng, lịch sử trống
        renderHistory();

        // Hỗ trợ bàn phím
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key >= '0' && key <= '9') inputNumber(key);
            if (key === '.') inputDot();
            if (key === '+' || key === '-') handleOperator(key === '+' ? '+' : '−');
            if (key === '*') handleOperator('×');
            if (key === '/') { e.preventDefault(); handleOperator('÷'); }
            if (key === 'Enter' || key === '=') handleEquals();
            if (key === 'Escape') clearAll();
            if (key === '%') percent();
        });
    })();
</script>
</body>
</html>
