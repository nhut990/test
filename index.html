<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy tính thông minh · thùng rác xoá lịch sử</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b2f3a 0%, #1e2129 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .calculator {
            max-width: 420px;
            width: 100%;
            background: #1b1e26;
            border-radius: 2.2rem;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06) inset;
            padding: 25px 22px 30px 22px;
        }

        /* lịch sử + nút xoá tất cả (thùng rác) */
        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 0 6px;
        }
        .history-header span {
            color: #b9c4dd;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            opacity: 0.7;
        }
        .delete-all-btn {
            background: #2d3440;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ecb2b2;
            font-size: 22px;
            box-shadow: 0 4px 0 #171c24, 0 3px 8px black;
            transition: 0.07s ease;
            border: 1px solid #505e72;
        }
        .delete-all-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a1f28;
        }
        .delete-all-btn:hover {
            background: #3e485a;
            color: #ffcaca;
        }

        .history-panel {
            background: #12141c;
            border-radius: 24px;
            padding: 18px 16px 12px 16px;
            margin-bottom: 18px;
            border: 1px solid #333842;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.6);
            min-height: 130px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            color: #a5b0c5;
            font-size: 19px;
            font-weight: 400;
            display: flex;
            align-items: baseline;
            line-height: 1.4;
            border-bottom: 1px dashed #2e3440;
            padding-bottom: 5px;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-op {
            color: #b7c5e0;
            font-weight: 300;
            margin-right: 12px;
        }
        .history-eq {
            color: #69758b;
            margin: 0 6px;
        }
        .history-result {
            color: #ebf0ff;
            font-weight: 500;
            margin-left: auto;
            background: #282e3c;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 18px;
            box-shadow: inset 0 1px 3px #0a0c12;
        }

        /* màn hình */
        .display-area {
            background: #0f1118;
            border-radius: 26px;
            padding: 14px 20px;
            margin-bottom: 20px;
            border: 1px solid #3b4252;
            box-shadow: 0 5px 0 #080a0e;
        }

        #calc-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #f2f4fa;
            font-size: 38px;
            font-weight: 400;
            text-align: right;
            caret-color: #6e8cff;
        }
        #calc-input::placeholder {
            color: #3f4658;
        }

        /* bảng nút */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .btn {
            background: #262c38;
            border: none;
            border-radius: 28px;
            padding: 18px 0;
            font-size: 26px;
            font-weight: 500;
            color: #e5eaf5;
            box-shadow: 0 6px 0 #12161d, 0 5px 12px rgba(0,0,0,0.5);
            transition: 0.07s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            border: 1px solid #404b5a;
            border-bottom-width: 2px;
            user-select: none;
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #0e1219, 0 5px 10px black;
        }

        .btn.top-action {
            background: #384153;
            color: #fffbee;
            border-color: #5e6b80;
        }

        .btn.operator {
            background: #31435b;
            color: #ffd898;
            border-color: #5c6f8a;
            font-size: 30px;
            font-weight: 600;
        }

        .btn.equals {
            background: #3d5d8c;
            border-color: #6a8fc0;
            color: white;
            font-size: 32px;
            box-shadow: 0 6px 0 #1f3147;
        }

        .btn.dot {
            font-size: 36px;
            padding-bottom: 22px;
        }

        /* icon thùng rác nhỏ trong nút */
        .trash-icon {
            font-size: 24px;
            line-height: 1;
        }

        /* hiệu ứng khi không có lịch sử */
        .empty-history-msg {
            color: #3f4a5a;
            text-align: center;
            font-size: 16px;
            padding: 16px 0;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="calculator">
    <!-- Header lịch sử + nút thùng rác xoá tất cả -->
    <div class="history-header">
        <span>Lịch sử</span>
        <button class="delete-all-btn" id="deleteAllHistoryBtn" title="Xoá tất cả lịch sử">
            <span class="trash-icon">🗑️</span>
        </button>
    </div>

    <!-- Khu vực lịch sử (ban đầu trống, không có mẫu) -->
    <div class="history-panel">
        <div class="history-list" id="historyContainer">
            <!-- Sẽ được render bằng js, ban đầu trống -->
        </div>
    </div>

    <!-- Màn hình nhập / kết quả -->
    <div class="display-area">
        <input type="text" id="calc-input" readonly placeholder="0" value="0">
    </div>

    <!-- Bảng nút bấm giống hình, đủ C, +/-, %, ÷, ×, −, +, 0, ., = -->
    <div class="button-grid">
        <!-- Hàng 1 -->
        <button class="btn top-action" id="clearBtn">C</button>
        <button class="btn top-action" id="plusMinusBtn">±</button>
        <button class="btn top-action" id="percentBtn">%</button>
        <button class="btn operator" id="divideBtn">÷</button>

        <!-- Hàng 2 -->
        <button class="btn" id="num7">7</button>
        <button class="btn" id="num8">8</button>
        <button class="btn" id="num9">9</button>
        <button class="btn operator" id="multiplyBtn">×</button>

        <!-- Hàng 3 -->
        <button class="btn" id="num4">4</button>
        <button class="btn" id="num5">5</button>
        <button class="btn" id="num6">6</button>
        <button class="btn operator" id="minusBtn">−</button>

        <!-- Hàng 4 -->
        <button class="btn" id="num1">1</button>
        <button class="btn" id="num2">2</button>
        <button class="btn" id="num3">3</button>
        <button class="btn operator" id="plusBtn">+</button>

        <!-- Hàng 5: 0, . , = -->
        <button class="btn" id="num0">0</button>
        <button class="btn dot" id="dotBtn">.</button>
        <button class="btn equals" id="equalsBtn">=</button>
    </div>
</div>

<script>
    (function() {
        // State
        let currentInput = '0';
        let previousOperand = null;
        let pendingOperator = null;
        let shouldResetInput = false;
        // Lịch sử: mảng các đối tượng { operation, result }
        let historyItems = [];   // không có mẫu, ban đầu trống

        const inputField = document.getElementById('calc-input');
        const historyContainer = document.getElementById('historyContainer');
        const deleteAllBtn = document.getElementById('deleteAllHistoryBtn');

        // ---------- Hàm hiển thị lịch sử (từ mảng historyItems, hiển thị tối đa 3 gần nhất) ----------
        function renderHistory() {
            if (historyItems.length === 0) {
                // Hiển thị thông báo trống hoặc để trống (không có dòng mẫu)
                historyContainer.innerHTML = `<div class="empty-history-msg">⋯ chưa có phép tính</div>`;
                return;
            }
            // Lấy tối đa 3 phần tử gần nhất (mảng lưu theo thứ tự mới nhất ở đầu)
            const latest = historyItems.slice(0, 3);
            let html = '';
            for (let item of latest) {
                html += `<div class="history-item">
                    <span class="history-op">${item.operation}</span>
                    <span class="history-eq">=</span>
                    <span class="history-result">${item.result}</span>
                </div>`;
            }
            historyContainer.innerHTML = html;
        }

        // Thêm một phép tính vào lịch sử (khi nhấn = hoặc sau khi tính toán)
        function addHistory(operation, result) {
            // Thêm vào đầu mảng (gần nhất)
            historyItems.unshift({ operation, result });
            // Giới hạn tối đa 20 dòng để tránh quá dài (có thể điều chỉnh)
            if (historyItems.length > 20) historyItems.pop();
            renderHistory();
        }

        // Xoá toàn bộ lịch sử (nút thùng rác)
        function deleteAllHistory() {
            historyItems = [];
            renderHistory();
        }

        // Cập nhật màn hình
        function updateDisplay(value) {
            inputField.value = value;
        }

        // Reset máy tính (C)
        function clearAll() {
            currentInput = '0';
            previousOperand = null;
            pendingOperator = null;
            shouldResetInput = false;
            updateDisplay(currentInput);
        }

        // Nhập số
        function inputNumber(num) {
            if (shouldResetInput) {
                currentInput = '';
                shouldResetInput = false;
            }
            if (currentInput === '0' && num === '0') {
                return;
            }
            if (currentInput === '0' && num !== '.') {
                currentInput = num;
            } else {
                if (currentInput.replace('-','').replace('.','').length < 12) {
                    currentInput += num;
                }
            }
            updateDisplay(currentInput);
        }

        // Dấu chấm
        function inputDot() {
            if (shouldResetInput) {
                currentInput = '0';
                shouldResetInput = false;
            }
            if (!currentInput.includes('.')) {
                currentInput += '.';
            }
            updateDisplay(currentInput);
        }

        // Đổi dấu
        function toggleSign() {
            if (currentInput !== '0' && currentInput !== '') {
                if (currentInput.startsWith('-')) {
                    currentInput = currentInput.substring(1);
                } else {
                    currentInput = '-' + currentInput;
                }
                updateDisplay(currentInput);
            }
        }

        // Phần trăm
        function percent() {
            if (currentInput) {
                let val = parseFloat(currentInput) / 100;
                currentInput = String(val);
                updateDisplay(currentInput);
            }
        }

        // Tính toán
        function compute(op, left, right) {
            const a = parseFloat(left);
            const b = parseFloat(right);
            if (isNaN(a) || isNaN(b)) return NaN;
            switch (op) {
                case '+': return a + b;
                case '−': return a - b;
                case '×': return a * b;
                case '÷': return a / b;
                default: return b;
            }
        }

        // Xử lý phép toán (+, −, ×, ÷)
        function handleOperator(opSymbol) {
            if (pendingOperator !== null && previousOperand !== null && !shouldResetInput) {
                // tính toán với toán tử đang chờ
                let result = compute(pendingOperator, previousOperand, currentInput);
                if (!isNaN(result) && isFinite(result)) {
                    let operationStr = `${previousOperand} ${pendingOperator} ${currentInput}`;
                    result = Math.round((result + Number.EPSILON) * 1e12) / 1e12;
                    let resultStr = String(result);
                    // Lưu vào lịch sử NGAY KHI CÓ KẾT QUẢ (theo yêu cầu: bấm mới lưu)
                    addHistory(operationStr, resultStr);
                    previousOperand = result;
                    currentInput = resultStr;
                } else {
                    currentInput = 'Error';
                    previousOperand = null;
                    pendingOperator = null;
                    updateDisplay(currentInput);
                    return;
                }
            } else {
                // chưa có toán tử trước
                if (previousOperand === null || shouldResetInput) {
                    previousOperand = currentInput;
                }
            }
            pendingOperator = opSymbol;
            shouldResetInput = true;
            updateDisplay(currentInput);
        }

        // Xử lý dấu bằng
        function handleEquals() {
            if (pendingOperator !== null && previousOperand !== null && !shouldResetInput) {
                let result = compute(pendingOperator, previousOperand, currentInput);
                if (!isNaN(result) && isFinite(result)) {
                    let operationStr = `${previousOperand} ${pendingOperator} ${currentInput}`;
                    result = Math.round((result + Number.EPSILON) * 1e12) / 1e12;
                    let resultStr = String(result);
                    // Lưu vào lịch sử khi nhấn =
                    addHistory(operationStr, resultStr);
                    currentInput = resultStr;
                    previousOperand = null;
                    pendingOperator = null;
                    shouldResetInput = true;
                } else {
                    currentInput = 'Error';
                    previousOperand = null;
                    pendingOperator = null;
                    shouldResetInput = true;
                }
                updateDisplay(currentInput);
            } else {
                // Nếu không có phép toán, chỉ reset
                shouldResetInput = true;
            }
        }

        // ---------- Gán sự kiện ----------
        document.getElementById('clearBtn').addEventListener('click', clearAll);
        document.getElementById('plusMinusBtn').addEventListener('click', toggleSign);
        document.getElementById('percentBtn').addEventListener('click', percent);
        document.getElementById('divideBtn').addEventListener('click', () => handleOperator('÷'));
        document.getElementById('multiplyBtn').addEventListener('click', () => handleOperator('×'));
        document.getElementById('minusBtn').addEventListener('click', () => handleOperator('−'));
        document.getElementById('plusBtn').addEventListener('click', () => handleOperator('+'));
        document.getElementById('equalsBtn').addEventListener('click', handleEquals);
        document.getElementById('dotBtn').addEventListener('click', inputDot);
        document.getElementById('num0').addEventListener('click', () => inputNumber('0'));
        document.getElementById('num1').addEventListener('click', () => inputNumber('1'));
        document.getElementById('num2').addEventListener('click', () => inputNumber('2'));
        document.getElementById('num3').addEventListener('click', () => inputNumber('3'));
        document.getElementById('num4').addEventListener('click', () => inputNumber('4'));
        document.getElementById('num5').addEventListener('click', () => inputNumber('5'));
        document.getElementById('num6').addEventListener('click', () => inputNumber('6'));
        document.getElementById('num7').addEventListener('click', () => inputNumber('7'));
        document.getElementById('num8').addEventListener('click', () => inputNumber('8'));
        document.getElementById('num9').addEventListener('click', () => inputNumber('9'));

        // Nút xoá tất cả lịch sử (thùng rác)
        deleteAllBtn.addEventListener('click', deleteAllHistory);

        // Khởi tạo màn hình và lịch sử trống (không có dòng mẫu)
        updateDisplay(currentInput);
        renderHistory();  // hiển thị "⋯ chưa có phép tính"

        // Hỗ trợ bàn phím (không bắt buộc nhưng tiện)
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key >= '0' && key <= '9') inputNumber(key);
            if (key === '.') inputDot();
            if (key === '+' || key === '-') handleOperator(key === '+' ? '+' : '−');
            if (key === '*') handleOperator('×');
            if (key === '/') {
                e.preventDefault();
                handleOperator('÷');
            }
            if (key === 'Enter' || key === '=') handleEquals();
            if (key === 'Escape') clearAll();
            if (key === '%') percent();
        });
    })();
</script>
</body>
</html>
