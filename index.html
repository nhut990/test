<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NES Emulator</title>
    <style>
        /* --- RESET & LAYOUT --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            touch-action: manipulation;
        }

        .container {
            background: #16213e;
            border-radius: 28px;
            padding: 20px 16px 30px;
            max-width: 520px;
            width: 100%;
            margin: 10px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a3a5e;
        }

        /* --- MÀN HÌNH GAME --- */
        #nes-container {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 256 / 240;
            width: 100%;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8);
            margin-bottom: 18px;
            touch-action: none;
        }

        #nes-container canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #000;
        }

        /* --- THANH TRẠNG THÁI --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #8a9bb5;
            font-size: 13px;
            padding: 0 4px 12px 4px;
            border-bottom: 1px solid #1f2b44;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 4px;
        }

        .status-bar .rom-name {
            color: #b7c9e2;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        .load-btn {
            background: #2a3a5e;
            border: none;
            color: #fff;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            letter-spacing: 0.3px;
            touch-action: manipulation;
        }
        .load-btn:active {
            transform: scale(0.94);
            background: #3a4e7a;
        }

        /* --- BỘ NÚT ĐIỀU KHIỂN --- */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 6px;
            touch-action: none;
        }

        /* Hàng D-Pad + Nút hành động */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        /* D-PAD */
        .dpad {
            position: relative;
            width: 140px;
            height: 140px;
            flex-shrink: 0;
            touch-action: none;
        }

        .dpad-btn {
            position: absolute;
            background: #2a2a4a;
            border: 2px solid #4a4a6a;
            border-radius: 10px;
            color: #c0d0e0;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.06s linear;
            touch-action: none;
            box-shadow: 0 4px 0 #0a0a1a, 0 6px 12px rgba(0,0,0,0.5);
            width: 44px;
            height: 44px;
        }
        .dpad-btn:active,
        .dpad-btn.active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0a0a1a;
            background: #3a3a6a;
            border-color: #6a6a9a;
        }

        .dpad-up    { top: 0; left: 50%; transform: translateX(-50%); }
        .dpad-down  { bottom: 0; left: 50%; transform: translateX(-50%); }
        .dpad-left  { left: 0; top: 50%; transform: translateY(-50%); }
        .dpad-right { right: 0; top: 50%; transform: translateY(-50%); }

        .dpad-up:active, .dpad-up.active    { transform: translateX(-50%) translateY(3px); }
        .dpad-down:active, .dpad-down.active{ transform: translateX(-50%) translateY(3px); }
        .dpad-left:active, .dpad-left.active{ transform: translateY(-50%) translateY(3px); }
        .dpad-right:active, .dpad-right.active{ transform: translateY(-50%) translateY(3px); }

        /* Nhóm nút A / B / SELECT / START */
        .action-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .ab-group {
            display: flex;
            gap: 18px;
        }

        .btn-a, .btn-b {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: 0.06s linear;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3), 0 8px 16px rgba(0,0,0,0.4);
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-a:active, .btn-a.active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        .btn-b:active, .btn-b.active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

        .btn-a { background: #e8454a; }
        .btn-b { background: #f4a33b; }

        .select-start {
            display: flex;
            gap: 24px;
        }

        .btn-select, .btn-start {
            background: #2a2a4a;
            border: none;
            border-radius: 30px;
            color: #b0c4de;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 18px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 0 #0a0a1a;
            transition: 0.06s linear;
            touch-action: none;
        }
        .btn-select:active, .btn-select.active { transform: translateY(3px); box-shadow: 0 1px 0 #0a0a1a; }
        .btn-start:active, .btn-start.active  { transform: translateY(3px); box-shadow: 0 1px 0 #0a0a1a; }

        /* Ẩn input file */
        #romInput {
            display: none;
        }

        /* Responsive nhỏ */
        @media (max-width: 460px) {
            .container { padding: 12px 10px 20px; }
            .dpad { width: 120px; height: 120px; }
            .dpad-btn { width: 38px; height: 38px; font-size: 18px; border-radius: 8px; }
            .btn-a, .btn-b { width: 50px; height: 50px; font-size: 16px; }
            .ab-group { gap: 12px; }
            .select-start { gap: 14px; }
            .btn-select, .btn-start { font-size: 10px; padding: 4px 12px; }
        }

        @media (max-width: 380px) {
            .dpad { width: 100px; height: 100px; }
            .dpad-btn { width: 32px; height: 32px; font-size: 14px; }
            .btn-a, .btn-b { width: 42px; height: 42px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Màn hình chơi game -->
    <div id="nes-container"></div>

    <!-- Thanh trạng thái -->
    <div class="status-bar">
        <span class="rom-name" id="romName">📼 Chưa có ROM</span>
        <button class="load-btn" id="loadRomBtn">📂 Chọn ROM</button>
    </div>

    <!-- Điều khiển -->
    <div class="controls">
        <div class="controls-row">
            <!-- D-Pad -->
            <div class="dpad" id="dpad">
                <div class="dpad-btn dpad-up"    data-btn="up">▲</div>
                <div class="dpad-btn dpad-down"  data-btn="down">▼</div>
                <div class="dpad-btn dpad-left"  data-btn="left">◀</div>
                <div class="dpad-btn dpad-right" data-btn="right">▶</div>
            </div>

            <!-- A / B / Select / Start -->
            <div class="action-buttons">
                <div class="ab-group">
                    <button class="btn-b" data-btn="b">B</button>
                    <button class="btn-a" data-btn="a">A</button>
                </div>
                <div class="select-start">
                    <button class="btn-select" data-btn="select">SELECT</button>
                    <button class="btn-start" data-btn="start">START</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Input file ẩn -->
    <input type="file" id="romInput" accept=".nes">
</div>

<!-- Thư viện JSNES -->
<script src="https://unpkg.com/jsnes@2/dist/jsnes.min.js">
</script>

<script>
    (function() {
        'use strict';

        // --- DOM refs ---
        const container = document.getElementById('nes-container');
        const romNameEl = document.getElementById('romName');
        const loadBtn = document.getElementById('loadRomBtn');
        const romInput = document.getElementById('romInput');

        // --- Khởi tạo JSNES Browser ---
        let browser = null;
        let romLoaded = false;

        try {
            browser = new jsnes.Browser({
                container: container,
                onError: function(err) {
                    console.error('[JSNES Error]', err);
                    alert('Lỗi giả lập: ' + (err.message || err));
                }
            });
        } catch (e) {
            alert('Không thể khởi tạo giả lập. Vui lòng thử lại.');
            throw e;
        }

        // --- Hàm load ROM từ file ---
        function loadROMFromFile(file) {
            if (!file) return;
            if (!file.name.toLowerCase().endsWith('.nes')) {
                alert('Vui lòng chọn file .nes');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = e.target.result;
                    // JSNES nhận dữ liệu dạng binary string hoặc Uint8Array
                    browser.loadROM(data);
                    romLoaded = true;
                    romNameEl.textContent = '🎮 ' + file.name;
                } catch (err) {
                    alert('Không thể load ROM: ' + err.message);
                    console.error(err);
                }
            };
            reader.onerror = function() {
                alert('Không thể đọc file.');
            };
            reader.readAsBinaryString(file);
        }

        // --- Sự kiện chọn file ---
        loadBtn.addEventListener('click', function(e) {
            e.preventDefault();
            romInput.click();
        });

        romInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                loadROMFromFile(this.files[0]);
            }
            this.value = ''; // reset để chọn lại cùng file
        });

        // --- Điều khiển cảm ứng: gửi sự kiện xuống JSNES ---
        // Map button -> mã JSNES
        const BTN_MAP = {
            'a': jsnes.Controller.BUTTON_A,
            'b': jsnes.Controller.BUTTON_B,
            'select': jsnes.Controller.BUTTON_SELECT,
            'start': jsnes.Controller.BUTTON_START,
            'up': jsnes.Controller.BUTTON_UP,
            'down': jsnes.Controller.BUTTON_DOWN,
            'left': jsnes.Controller.BUTTON_LEFT,
            'right': jsnes.Controller.BUTTON_RIGHT,
        };

        // Hàm gửi trạng thái nút (xuống / lên)
        function setButton(btnName, pressed) {
            if (!browser) return;
            const code = BTN_MAP[btnName];
            if (code === undefined) return;
            if (pressed) {
                browser.buttonDown(1, code); // player 1
            } else {
                browser.buttonUp(1, code);
            }
        }

        // --- Gán sự kiện cho tất cả nút điều khiển (touch & mouse) ---

        // Lấy tất cả phần tử có data-btn
        const controlEls = document.querySelectorAll('[data-btn]');

        function handleStart(e) {
            e.preventDefault();
            const btn = this.dataset.btn;
            if (!btn) return;
            this.classList.add('active');
            setButton(btn, true);
        }

        function handleEnd(e) {
            e.preventDefault();
            const btn = this.dataset.btn;
            if (!btn) return;
            this.classList.remove('active');
            setButton(btn, false);
        }

        // Hỗ trợ cả touch và mouse
        controlEls.forEach(el => {
            // Touch events
            el.addEventListener('touchstart', handleStart, { passive: false });
            el.addEventListener('touchend', handleEnd, { passive: false });
            el.addEventListener('touchcancel', handleEnd, { passive: false });

            // Mouse events (cho desktop / debug)
            el.addEventListener('mousedown', handleStart);
            el.addEventListener('mouseup', handleEnd);
            el.addEventListener('mouseleave', handleEnd);
        });

        // Ngăn context menu khi bấm giữ trên mobile
        document.querySelectorAll('.controls button, .controls .dpad-btn').forEach(el => {
            el.addEventListener('contextmenu', (e) => e.preventDefault());
        });

        // --- Thông báo hướng dẫn ---
        console.log('✅ NES Emulator sẵn sàng! Nhấn "Chọn ROM" để tải game .nes.');
        romNameEl.textContent = '📼 Chọn ROM để chơi';

        // Nếu muốn load ROM mẫu từ URL (thử nghiệm), bỏ comment đoạn dưới:
        // jsnes.Browser.loadROMFromURL('https://example.com/game.nes', function(err, data) {
        //     if (!err && data) browser.loadROM(data);
        // });

    })();
</script>

</body>
</html>
